<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:12px;color:#666;}
.legend span{display:flex;align-items:center;gap:5px;}
.lsq{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr;}}
.mini{background:#1e2235;border-radius:12px;padding:14px 16px;}

.occ-v{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;}
.occ-l{font-size:12px;color:#555;margin-top:4px;}
.no-data{font-size:13px;color:#555;text-align:center;padding:24px 0;}
.divider{border:none;border-top:0.5px solid #1e2235;margin:8px 0 24px;}
.insight{font-size:12px;color:#666;margin-top:10px;padding-top:10px;border-top:0.5px solid #2a2d35;line-height:1.6;}
.insight.info{color:#82B2C0;}.insight.warn{color:#F6C7B3;}
.conclusion{font-size:13px;color:#C3DEDD;background:#0C2840;border-left:3px solid #82B2C0;border-radius:0 8px 8px 0;padding:10px 14px;margin-top:12px;line-height:1.6;}
.disclaimer{background:#1e1a10;border-left:3px solid #F0E2C3;border-radius:0 10px 10px 0;padding:12px 16px;font-size:13px;color:#F0E2C3bb;line-height:1.5;margin-bottom:24px;}
.limits-card{background:#1e1a10;border-left:3px solid #F0E2C3;border-radius:0 12px 12px 0;padding:16px 18px;}
.limits-card p{font-size:13px;color:#F0E2C3bb;line-height:2;}
.heatmap-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;}
.nav-grp{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.arrow-btn{background:transparent;border:0.5px solid #2a2d35;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#666;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.arrow-btn:hover{border-color:#82B2C0;color:#82B2C0;}
.arrow-btn:disabled{opacity:0.2;cursor:default;}
.month-name{font-size:13px;font-weight:500;color:#C3DEDD;min-width:80px;text-align:center;}
.view-select{font-size:12px;color:#aaa;background:#1e2235;border:0.5px solid #2a2d35;border-radius:8px;padding:6px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;outline:none;width:180px;flex-shrink:0;}
.day-lbls{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
.dl{font-size:10px;color:#444;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cc{border-radius:6px;min-height:44px;padding:4px;display:flex;flex-direction:column;justify-content:space-between;cursor:default;transition:transform 0.1s;}
.cc:hover{transform:scale(1.05);z-index:10;position:relative;}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.cc-day{font-size:9px;line-height:1;}
.cc-dose{font-size:8px;font-family:'DM Mono',monospace;line-height:1;}

.cc-effets{font-size:8px;line-height:1.3;margin-top:2px;}
.cc-empty{min-height:44px;}
.cc-nodata{border-radius:6px;min-height:44px;background:#141820;opacity:0.3;}
.legend-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}

.swatch div{width:14px;height:8px;border-radius:2px;}

<body>
<div id="root"></div>
<script>
const SHEET_ID='1BZWdgCe6JFlP8yVGkcjuqke0TDeqrbvhXUhaJy1NpxM';
const gc='rgba(255,255,255,0.04)';const tc='#555';
let charts=[];let rawData=[];let rawEffets=[];let currentTab='overview';
const MOIS=['jan.','fev.','mar.','avr.','mai','juin','juil.','aout','sep.','oct.','nov.','dec.'];
function formatDate(str){if(!str)return '--';const p=str.split('/');if(p.length<3)return str;return parseInt(p[0])+' '+MOIS[parseInt(p[1])-1]+' '+p[2];}
function toMin(str){if(!str)return null;const p=str.toString().trim().split(':');if(p.length<2)return null;const h=parseInt(p[0]);const m=parseInt(p[1]);if(isNaN(h)||isNaN(m))return null;return h*60+m;}
function minToStr(m){if(m==null||isNaN(m))return '--';const h=Math.floor(m/60);const mn=Math.round(m%60);return h.toString().padStart(2,'0')+':'+mn.toString().padStart(2,'0');}
function parseNum(v){if(v==null||v==='')return null;const n=parseFloat(v.toString().replace(',','.'));return isNaN(n)?null:n;}
function avg(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function stddev(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));if(v.length<2)return null;const m=avg(v);return Math.round(Math.sqrt(v.reduce((s,x)=>s+(x-m)**2,0)/v.length));}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;const c=new Chart(el,cfg);charts.push(c);return c;}
function getField(row,...keys){for(const k of keys){if(row[k]!==undefined&&row[k]!=='')return row[k];}return null;}
function parseDateStr(str){if(!str)return null;const p=str.split('/');if(p.length<3)return null;return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
function destroyCharts(){charts.forEach(c=>{try{c.destroy();}catch(e){}});charts=[];}
const fmtH=v=>{if(v==null||typeof v!=='number')return null;const h=Math.floor(v/60);const m=Math.round(v%60);return h.toString().padStart(2,'0')+'h'+m.toString().padStart(2,'0');};
const tooltipH={mode:'index',intersect:false,callbacks:{label:ctx=>{const v=ctx.raw;if(v==null||typeof v!=='number')return null;if(ctx.dataset.yAxisID==='y'||ctx.dataset.yAxisID==='y2')return ctx.dataset.label+': '+fmtH(v);return ctx.dataset.label+': '+v;}}};

async function fetchSheet(sheetName){
  const url='/.netlify/functions/sheets?sheet='+encodeURIComponent(sheetName);
  const r=await fetch(url);
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Erreur '+r.status);}
  const d=await r.json();
  if(!d.values||d.values.length<2)return[];
  const[headers,...rows]=d.values;
  return rows.map(row=>{const o={};headers.forEach((h,i)=>o[h.trim()]=row[i]||'');return o;});
}

async function startWithKey(){
  document.getElementById('root').innerHTML='<div class="loading"><div class="spinner"></div><div class="load-text">Connexion a Google Sheets...</div></div>';
  try{
    [rawData,rawEffets]=await Promise.all([fetchSheet('DATA'),fetchSheet('Effets')]);
    renderDashboard();
  }catch(e){
    document.getElementById('root').innerHTML='<div style="padding:40px 24px;"><div class="error-box">Impossible de charger les donnees.<br><br>'+e.message+'<br><br><button onclick="startWithKey()" style="margin-top:12px;background:#82B2C0;border:none;border-radius:8px;padding:10px 20px;color:#0d1629;cursor:pointer;font-size:13px;">Reessayer</button></div></div>';
  }
}

const filterState={prise:'all',dose:'all',traitement:'all',dateMin:null,dateMax:null};
let calMonthIdx=0;let calView='eff';
function initCalMonthIdx(){const allRows=rawData.filter(r=>r.jour&&r.jour.trim());const months=[...new Set(allRows.map(r=>{const d=parseDateStr(r.jour);if(!d)return null;return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');}).filter(Boolean))].sort();if(!months.length)return;const now=new Date();const curKey=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0');const idx=months.indexOf(curKey);calMonthIdx=idx>=0?idx:months.length-1;}
let granEff='jour';let granHeure='jour';let granFC='jour';

function getFiltered(){
  return rawData.filter(r=>{
    if(!r.jour||!r.jour.trim())return false;
    if(filterState.prise!=='all'&&r.prise!==filterState.prise)return false;
    if(filterState.dose!=='all'&&r.dose!==filterState.dose)return false;
    if(filterState.traitement!=='all'&&r.traitement!==filterState.traitement)return false;
    if(filterState.dateMin||filterState.dateMax){const d=parseDateStr(r.jour);if(!d)return false;if(filterState.dateMin&&d<filterState.dateMin)return false;if(filterState.dateMax&&d>filterState.dateMax)return false;}
    return true;
  });
}
function getFilteredEffets(rows){const dates=new Set(rows.map(r=>r.jour));return rawEffets.filter(e=>dates.has(e.date));}
function resetFilters(){filterState.prise='all';filterState.dose='all';filterState.traitement='all';filterState.dateMin=null;filterState.dateMax=null;renderDashboard();}

function groupByWeek(rows,valFn){
  const weeks={};rows.forEach(r=>{const d=parseDateStr(r.jour);if(!d)return;const mon=new Date(d);mon.setDate(d.getDate()-((d.getDay()+6)%7));const k=mon.toISOString().slice(0,10);if(!weeks[k])weeks[k]=[];const v=valFn(r);if(v!=null)weeks[k].push(v);});
  return Object.entries(weeks).sort(([a],[b])=>a.localeCompare(b)).map(([k,vals])=>({label:'S '+k.slice(5,7)+'/'+k.slice(2,4),val:vals.length?avg(vals):null}));
}
function groupByMonth(rows,valFn){
  const months={};rows.forEach(r=>{const d=parseDateStr(r.jour);if(!d)return;const k=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');if(!months[k])months[k]=[];const v=valFn(r);if(v!=null)months[k].push(v);});
  return Object.entries(months).sort(([a],[b])=>a.localeCompare(b)).map(([k,vals])=>({label:MOIS[parseInt(k.slice(5))-1]+' '+k.slice(2,4),val:vals.length?avg(vals):null}));
}

function effBg(v){if(v==null)return'#1a1e2e';if(v>=60)return'#1a3a45';if(v>=50)return'#3d6878';if(v>=40)return'#82B2C0';if(v>=30)return'#C3DEDD';if(v>=20)return'#deeef0';return'#E8F4F5';}
function effTx(v){if(v==null)return'#2a2d35';if(v>=50)return'#C3DEDD';if(v>=30)return'#1a3a45';return'#3d6878';}
function coucherBg(m){if(m==null)return'#1a1e2e';if(m>=24*60+30)return'#1a3a45';if(m>=24*60+15)return'#3d6878';if(m>=24*60)return'#82B2C0';if(m>=23*60+45)return'#C3DEDD';if(m>=23*60+30)return'#deeef0';return'#E8F4F5';}
function coucherTx(m){if(m==null)return'#2a2d35';if(m>=24*60)return'#C3DEDD';if(m>=23*60+30)return'#1a3a45';return'#3d6878';}
function priseBg(m){if(m==null)return'#1a1e2e';if(m>=11*60+30)return'#1a3a45';if(m>=11*60)return'#3d6878';if(m>=10*60+30)return'#82B2C0';if(m>=10*60)return'#C3DEDD';if(m>=9*60+30)return'#deeef0';return'#E8F4F5';}
function priseTx(m){if(m==null)return'#2a2d35';if(m>=11*60)return'#C3DEDD';if(m>=10*60+30)return'#1a3a45';return'#3d6878';}
function effetsBg(effets){if(!effets||effets.length===0)return'#1e2235';const neg=['Irritabilite','Fatigue','Maux de tete'];const pos=['Concentration','Energie','Clarte'];const hasNeg=effets.some(e=>neg.some(n=>e.includes(n)));const hasPos=effets.some(e=>pos.some(p=>e.includes(p)));if(hasNeg&&hasPos)return'#3a2a10';if(hasNeg)return'#3a1a10';if(hasPos)return'#0a2a20';return'#1e2235';}
function effetsTx(effets){if(!effets||effets.length===0)return'#333';const neg=['Irritabilite','Fatigue','Maux de tete'];const pos=['Concentration','Energie','Clarte'];const hasNeg=effets.some(e=>neg.some(n=>e.includes(n)));const hasPos=effets.some(e=>pos.some(p=>e.includes(p)));if(hasNeg&&hasPos)return'#F0E2C3';if(hasNeg)return'#F6C7B3';if(hasPos)return'#DCECE9';return'#555';}

function buildCalendar(containerId,rows,effetsRows){
  const allRows=rawData.filter(r=>r.jour&&r.jour.trim());
  const months=[...new Set(allRows.map(r=>{const d=parseDateStr(r.jour);if(!d)return null;return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');}).filter(Boolean))].sort();
  if(!months.length)return;
  if(calMonthIdx>=months.length)calMonthIdx=months.length-1;
  const mKey=months[calMonthIdx];
  const[yr,mo]=[parseInt(mKey.slice(0,4)),parseInt(mKey.slice(5))];
  const monthRows=allRows.filter(r=>{const d=parseDateStr(r.jour);return d&&d.getFullYear()===yr&&d.getMonth()+1===mo;});
  const effetsMap={};effetsRows.forEach(e=>{if(!effetsMap[e.date])effetsMap[e.date]=[];effetsMap[e.date].push(e.effet||'');});
  const daysInMonth=new Date(yr,mo,0).getDate();
  const firstDay=(new Date(yr,mo-1,1).getDay()+6)%7;
  const rowsMap={};monthRows.forEach(r=>{const d=parseDateStr(r.jour);if(d)rowsMap[d.getDate()]=r;});
  const monthLabels={1:'jan.',2:'fev.',3:'mar.',4:'avr.',5:'mai',6:'juin',7:'juil.',8:'aout',9:'sep.',10:'oct.',11:'nov.',12:'dec.'};
  const monthLabel=monthLabels[mo]||String(mo);
  const container=document.getElementById(containerId);if(!container)return;
  const prevDis=calMonthIdx===0?'disabled':'';
  const nextDis=calMonthIdx>=months.length-1?'disabled':'';
  container.innerHTML='<div class="heatmap-controls"><div class="nav-grp"><button class="arrow-btn" onclick="calPrev()" '+prevDis+'>&#8249;</button><div class="month-name">'+monthLabel+' '+yr+'</div><button class="arrow-btn" onclick="calNext()" '+nextDis+'>&#8250;</button></div><select class="view-select" onchange="setCalView(this.value)"><option value="eff"'+(calView==='eff'?' selected':'')+'>Efficacite</option><option value="coucher"'+(calView==='coucher'?' selected':'')+'>Heure de coucher</option><option value="prise"'+(calView==='prise'?' selected':'')+'>Heure de prise</option><option value="prise_on"'+(calView==='prise_on'?' selected':'')+'>Prise Oui / Non</option><option value="effets"'+(calView==='effets'?' selected':'')+'>Effets</option></select></div><div class="day-lbls"><div class="dl">Lun</div><div class="dl">Mar</div><div class="dl">Mer</div><div class="dl">Jeu</div><div class="dl">Ven</div><div class="dl" style="color:#2a2d35;">Sam</div><div class="dl" style="color:#2a2d35;">Dim</div></div><div class="cal-grid" id="'+containerId+'-cells"></div><div class="legend-row" id="'+containerId+'-legend"></div><div class="insight info" id="'+containerId+'-note"></div>';
  const cells=document.getElementById(containerId+'-cells');
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cc-empty';cells.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const r=rowsMap[d];

function pearson(a,b){const pairs=a.map((v,i)=>[v,b[i]]).filter(([x,y])=>x!=null&&y!=null);if(pairs.length<3)return null;const mx=avg(pairs.map(p=>p[0]));const my=avg(pairs.map(p=>p[1]));const num=pairs.reduce((s,[x,y])=>s+(x-mx)*(y-my),0);const da=Math.sqrt(pairs.reduce((s,[x])=>s+(x-mx)**2,0));const db=Math.sqrt(pairs.reduce((s,[,y])=>s+(y-my)**2,0));return(da===0||db===0)?null:num/(da*db);}

    const scatterCoucherEff=rows.map((r,i)=>{const c=parseNum(r.coucher_min);const nxt=rows[i+1];if(!nxt)return null;const e=parseNum(getField(nxt,'efficacite_auto-rapportee'));if(c==null||e==null||c<=0)return null;return{x:c,y:Math.round(e*100)};}).filter(Boolean);
    const ecarts=rows.map(r=>{const p=toMin(r.heure_prise);if(p==null||avgPrise==null)return null;return Math.round(p-avgPrise);}).filter(v=>v!=null);
    const ecartsJours=rows.filter(r=>toMin(r.heure_prise)!=null).map(r=>{const p=r.jour.split('/');return p.length>=2?p[0]+'/'+p[1]:r.jour;});
    const semWeeks=groupByWeek(rows,r=>{const v=parseNum(getField(r,'efficacite_auto-rapportee'));return v!=null?Math.round(v*100):null;});
    const wfData=semWeeks.map((w,i)=>i===0?w.val:(w.val!=null&&semWeeks[i-1].val!=null?Math.round(w.val-semWeeks[i-1].val):null));
    const wfLabels=semWeeks.map((w,i)=>i===0?w.label+' (base)':w.label+(wfData[i]!=null?(wfData[i]>=0?' (+'+wfData[i]+' pts)':' ('+wfData[i]+' pts)'):''));
    const wfColors=wfData.map((v,i)=>i===0?'#82B2C0':v!=null?(v>=0?'#DCECE9':'#F6C7B3'):'#2a2d35');
    const sem1Eff=semWeeks.slice(0,Math.ceil(semWeeks.length/2)).map(w=>w.val).filter(v=>v!=null);
    const sem2Eff=semWeeks.slice(Math.ceil(semWeeks.length/2)).map(w=>w.val).filter(v=>v!=null);
    const ae1=avg(sem1Eff);const ae2=avg(sem2Eff);
    let wfConclusion='Pas assez de donnees pour evaluer la tendance.';
    if(ae1!=null&&ae2!=null){const diff=Math.round(ae2-ae1);if(Math.abs(diff)<=3)wfConclusion='Efficacite stable sur les '+semWeeks.length+' semaines observees - pas de tendance nette a ce stade.';else if(diff>0)wfConclusion='Tendance a la hausse : efficacite moyenne en progression de '+diff+' pts entre la premiere et la deuxieme moitie de la periode.';else wfConclusion='Tendance a la baisse : efficacite moyenne en recul de '+Math.abs(diff)+' pts entre la premiere et la deuxieme moitie de la periode.';}
    const corrMetrics=['Efficacite','H. prise','FC repos','Coucher'];
    const corrVals=[rows.map(r=>parseNum(getField(r,'efficacite_auto-rapportee'))),rows.map(r=>toMin(r.heure_prise)),rows.map(r=>parseNum(r.fq_repos_moy)),rows.map(r=>{const v=parseNum(r.coucher_min);return(v!=null&&v>0)?v:null;})];
    const corrMatrix=corrVals.map((a,i)=>corrVals.map((b,j)=>i===j?1:pearson(a,b)));
    let maxCorrVal=0;let maxCorrI=-1;let maxCorrJ=-1;
    corrMatrix.forEach((row,i)=>row.forEach((v,j)=>{if(i<j&&v!=null&&Math.abs(v)>maxCorrVal){maxCorrVal=Math.abs(v);maxCorrI=i;maxCorrJ=j;}}));
    const maxCorrDir=maxCorrI>=0?corrMatrix[maxCorrI][maxCorrJ]:null;
    const maxCorrConclusion=maxCorrI>=0?'Piste principale a surveiller : '+corrMetrics[maxCorrI]+' / '+corrMetrics[maxCorrJ]+' (r = '+maxCorrDir.toFixed(2)+'). '+(maxCorrDir>0?'Ces deux metriques tendent a augmenter ensemble.':'Ces deux metriques evoluent en sens inverse.')+' A confirmer sur davantage de donnees.':'Pas assez de donnees pour identifier des correlations.';
    let regConclusion='';
    if(stdPrise!=null){const irregs=ecarts.filter(v=>Math.abs(v)>30).length;regConclusion='Ecart-type moyen de '+stdPrise+' min - prise '+reg.toLowerCase()+'. '+(irregs>0?irregs+' jour'+(irregs>1?'s':'')+' avec un decalage de plus de 30 min.':'Aucun jour avec un decalage superieur a 30 min.');}
    const coucherTardif=scatterCoucherEff.filter(p=>p.x>60);
    const avgEffLate=coucherTardif.length?Math.round(avg(coucherTardif.map(p=>p.y))):null;
    const avgEffEarly=scatterCoucherEff.filter(p=>p.x<=60).length?Math.round(avg(scatterCoucherEff.filter(p=>p.x<=60).map(p=>p.y))):null;
    const coucherConclusion=avgEffLate!=null&&avgEffEarly!=null?'Apres un coucher tardif (>01h00), l efficacite moyenne du lendemain est de '+avgEffLate+'% contre '+avgEffEarly+'% apres un coucher avant 01h00. '+(avgEffLate<avgEffEarly?'Tendance a surveiller.':'Pas de difference notable.'):'Pas assez de donnees pour evaluer l impact du coucher sur l efficacite du lendemain.';

    pageContent='<div class="disclaimer">Donnees auto-rapportees · Sur '+nPrise+' jours avec prise · Tendances descriptives, non causales.</div>'+
'<div class="sec"><div class="s-question">Ou en suis-je ?</div><div class="s-sub">Vue d ensemble de l evolution de l efficacite semaine par semaine.</div><div class="chart-card"><div class="ct">Variation semaine par semaine</div><div style="position:relative;width:100%;height:160px;"><canvas id="c_wf" role="img" aria-label="Waterfall efficacite">Waterfall</canvas></div><div class="legend" style="margin-top:10px;"><span><span class="lsq" style="background:#82B2C0;"></span>Semaine de reference</span><span><span class="lsq" style="background:#DCECE9;"></span>Progression</span><span><span class="lsq" style="background:#F6C7B3;"></span>Recul</span></div><div class="conclusion">'+wfConclusion+'</div></div></div>'+
'<div class="divider"></div>'+
'<div class="sec"><div class="s-question">Ma routine influence-t-elle les resultats ?</div><div class="s-sub">Lien entre regularite de prise et efficacite ressentie.</div><div class="grid2"><div class="chart-card"><div class="ct">Regularite des prises - ecart quotidien a la moyenne</div><div style="position:relative;width:100%;height:160px;"><canvas id="c_reg" role="img" aria-label="Regularite des prises">Regularite</canvas></div><div class="legend" style="margin-top:8px;"><span><span class="lsq" style="background:#F6C7B3;"></span>Prise tardive</span><span><span class="lsq" style="background:#DCECE9;"></span>Prise en avance</span></div><div class="conclusion">'+(regConclusion||'Pas assez de donnees.')+'</div></div><div class="chart-card"><div class="ct">Heure de prise vs efficacite ressentie</div><div style="position:relative;width:100%;height:160px;"><canvas id="c_sc1" role="img" aria-label="Scatter heure prise vs efficacite">Scatter</canvas></div><div class="legend" style="margin-top:8px;"><span><span class="lsq" style="background:#1a3a45;"></span>&ge;50%</span><span><span class="lsq" style="background:#3d6878;"></span>&ge;40%</span><span><span class="lsq" style="background:#82B2C0;"></span>&ge;30%</span><span><span class="lsq" style="background:#C3DEDD;"></span>&lt;30%</span></div><div class="conclusion">Pas de relation claire entre l heure de prise et l efficacite - les prises tardives coincident souvent avec les jours non-travailles, ce qui biaise la lecture.</div></div></div></div>'+
'<div class="divider"></div>'+
'<div class="sec"><div class="s-question">Mon mode de vie influence-t-il les resultats ?</div><div class="s-sub">Impact du contexte de journee et du sommeil sur l efficacite.</div><div class="grid2"><div class="chart-card"><div class="ct">Distribution : jours travailles vs non-travailles</div><div class="legend" style="margin-bottom:8px;"><span><span class="lsq" style="background:#82B2C0;"></span>Travaille ('+travRows.length+' j.)</span><span><span class="lsq" style="background:#F0E2C3;"></span>Non-travaille ('+nonTravRows.length+' j.)</span></div><div style="position:relative;width:100%;height:150px;"><canvas id="c_dist" role="img" aria-label="Distribution scores">Distribution</canvas></div><div class="conclusion">Efficacite moyenne de '+(avgEffTrav!=null?avgEffTrav+'%':'--')+' les jours travailles contre '+(avgEffNonTrav!=null?avgEffNonTrav+'%':'--')+' les jours non-travailles. Cet ecart reflete probablement l absence d attentes fonctionnelles, pas un effet pharmacologique.</div></div><div class="chart-card"><div class="ct">Heure de coucher vs efficacite du lendemain</div><div style="position:relative;width:100%;height:160px;"><canvas id="c_sc2" role="img" aria-label="Scatter coucher vs efficacite">Scatter coucher</canvas></div><div class="legend" style="margin-top:8px;"><span><span class="lsq" style="background:#C3DEDD;"></span>Coucher tot</span><span><span class="lsq" style="background:#1a3a45;"></span>Coucher tardif</span></div><div class="conclusion">'+coucherConclusion+'</div></div></div></div>'+
'<div class="divider"></div>'+
'<div class="sec"><div class="s-question">Quelles pistes surveiller ?</div><div class="s-sub">Relations entre metriques - lecture exploratoire uniquement.</div><div class="chart-card"><div class="ct">Correlations entre metriques</div><div id="corr-heatmap" style="display:flex;flex-direction:column;gap:3px;margin-bottom:10px;"></div><div style="display:flex;align-items:center;gap:8px;margin-top:6px;"><span style="font-size:11px;color:#444;">Inverse</span><div style="display:flex;gap:2px;"><div style="width:14px;height:8px;border-radius:2px;background:#4a2010;"></div><div style="width:14px;height:8px;border-radius:2px;background:#d4906a;"></div><div style="width:14px;height:8px;border-radius:2px;background:#1e2235;"></div><div style="width:14px;height:8px;border-radius:2px;background:#3d6878;"></div><div style="width:14px;height:8px;border-radius:2px;background:#1a3a45;"></div></div><span style="font-size:11px;color:#444;">Forte</span><span style="font-size:11px;color:#333;margin-left:8px;">Case surlignee = correlation la plus forte</span></div><div id=\"corr-examples\" style=\"margin-top:10px;padding-top:10px;border-top:0.5px solid #2a2d35;\"></div><div class="conclusion">'+maxCorrConclusion+'</div></div></div>'+
'<div class="divider"></div>'+
'<div class="sec"><div class="slabel">Limites de l analyse</div><div class="limits-card"><p>· Sur '+nPrise+' jours - aucune correlation statistiquement significative a ce stade</p><p>· Donnees auto-rapportees - biais de perception possible</p><p>· Une seule dose testee - pas de comparaison possible</p><p>· Facteurs externes non mesures (stress, alimentation, activite)</p><p>· Potentiel effet placebo non exclu</p><p>· Pas de comparaison avec une periode sans traitement</p></div></div>';

    setTimeout(()=>{
      mkChart('c_wf',{type:'bar',data:{labels:wfLabels,datasets:[{data:wfData,backgroundColor:wfColors,borderRadius:5,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const v=ctx.raw;return v!=null?(v>0?'+':'')+Math.round(v)+'%':null;}}}},scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:v=>(v>0?'+':'')+Math.round(v)+'%',maxTicksLimit:5},grid:{color:gc}}}}});
      mkChart('c_reg',{type:'bar',data:{labels:ecartsJours,datasets:[{data:ecarts,backgroundColor:ecarts.map(v=>v>0?'#F6C7B3':'#DCECE9'),borderRadius:3,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9},maxTicksLimit:10,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:v=>(v>0?'+':'')+v+' min',maxTicksLimit:5},grid:{color:gc}}}}});
      const effColorSc=v=>{if(v>=50)return'#1a3a45';if(v>=40)return'#3d6878';if(v>=30)return'#82B2C0';return'#C3DEDD';};
      mkChart('c_sc1',{type:'scatter',data:{datasets:[{data:scatterPriseEff.map(p=>({x:p.x,y:p.y})),backgroundColor:scatterPriseEff.map(p=>effColorSc(p.eff)),pointRadius:6,pointHoverRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'nearest',intersect:false,callbacks:{label:ctx=>fmtH(ctx.raw.x)+' -> '+ctx.raw.y+'%'}}},scales:{x:{ticks:{color:tc,font:{size:9},callback:fmtH,maxTicksLimit:5},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},callback:v=>v+'%',maxTicksLimit:5},grid:{color:gc},min:0,max:70}}}});
      mkChart('c_dist',{type:'bar',data:{labels:distLabels,datasets:[{label:'Travaille',data:travDistData,backgroundColor:'#82B2C0',borderRadius:4,borderWidth:0},{label:'Non-travaille',data:nonTravDistData,backgroundColor:'#F0E2C3',borderRadius:4,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},stepSize:1,maxTicksLimit:5},grid:{color:gc}}}}});
      const coucherColorSc=v=>{if(v<=30)return'#C3DEDD';if(v<=60)return'#82B2C0';if(v<=90)return'#3d6878';return'#1a3a45';};
      mkChart('c_sc2',{type:'scatter',data:{datasets:[{data:scatterCoucherEff,backgroundColor:scatterCoucherEff.map(p=>coucherColorSc(p.x)),pointRadius:6,pointHoverRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'nearest',intersect:false,callbacks:{label:ctx=>'Coucher '+fmtH(ctx.raw.x)+' -> '+ctx.raw.y+'%'}}},scales:{x:{ticks:{color:tc,font:{size:9},callback:fmtH,maxTicksLimit:5},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},callback:v=>v+'%',maxTicksLimit:5},grid:{color:gc},min:0,max:70}}}});
      function corrColor(v,isMax){if(isMax)return{bg:'#F0E2C3',tx:'#4a2010'};if(v>=0.4)return{bg:'#1a3a45',tx:'#C3DEDD'};if(v>=0.15)return{bg:'#2a3a4a',tx:'#82B2C0'};if(v>=-0.15)return{bg:'#1e2235',tx:'#444'};if(v>=-0.4)return{bg:'#3a2a20',tx:'#F0E2C3'};return{bg:'#4a2010',tx:'#F6C7B3'};}
      const hm=document.getElementById('corr-heatmap');
      if(hm){const hr=document.createElement('div');hr.style.cssText='display:grid;grid-template-columns:90px repeat(4,1fr);gap:3px;';hr.innerHTML='<div></div>'+corrMetrics.map(m=>'<div style="font-size:10px;color:#444;text-align:center;padding:4px 2px;">'+m+'</div>').join('');hm.appendChild(hr);corrMatrix.forEach((row,i)=>{const r=document.createElement('div');r.style.cssText='display:grid;grid-template-columns:90px repeat(4,1fr);gap:3px;';r.innerHTML='<div style="font-size:10px;color:#444;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;">'+corrMetrics[i]+'</div>'+row.map((v,j)=>{const absV=v!=null?Math.abs(v):0;const isMax=i!==j&&v!=null&&maxCorrI>=0&&i===maxCorrI&&j===maxCorrJ;const c=i===j?{bg:'#161920',tx:'#333'}:corrColor(v,isMax);const b=isMax?'font-weight:500;':'';const d=i===j?'&mdash;':v!=null?v.toFixed(2):'--';return'<div style="background:'+c.bg+';border-radius:4px;padding:8px 4px;text-align:center;font-size:11px;color:'+c.tx+';font-family:\'DM Mono\',monospace;'+b+'">'+d+'</div>';}).join('');hm.appendChild(r);});}
      const exDiv=document.getElementById('corr-examples');if(exDiv){const examples=[];corrMatrix.forEach((row,i)=>row.forEach((v,j)=>{if(i<j&&v!=null&&Math.abs(v)>=0.3){const dir=v>0?'augmentent ensemble':'\u00e9voluent en sens inverse';examples.push('<div style="font-size:12px;color:#888;margin-bottom:6px;"><span style="color:#C3DEDD;font-weight:500;">'+corrMetrics[i]+' / '+corrMetrics[j]+'</span> (r\u00a0=\u00a0'+v.toFixed(2)+') \u2014 Ces deux m\u00e9triques '+dir+'.</div>');}}));exDiv.innerHTML=examples.length?'<div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Exemples de lecture</div>'+examples.join(''):'<div style="font-size:12px;color:#444;">Pas de corr\u00e9lation notable.</div>';}
    },100);
  }

  document.getElementById('root').innerHTML='<div class="app"><div class="cover"><div class="cover-top"><div><div class="mol">CH&#8323; \u00b7 C&#8321;&#8324;H&#8321;&#8329;NO&#8322;</div><div class="ctitle">Suivi traitement TDAH</div><div class="csub">'+traitement+' \u00b7 '+type+' \u00b7 '+dose+'</div></div><button class="refresh-btn" onclick="location.reload()">&#8634; Actualiser</button></div><div class="cover-kpis"><div class="ckpi"><div class="ckpi-v">'+allRows.length+'</div><div class="ckpi-l">Jours de suivi</div></div><div class="ckpi"><div class="ckpi-v">'+allRows.filter(r=>r.prise==='Oui').length+'</div><div class="ckpi-l">Jours avec prise</div></div><div class="ckpi"><div class="ckpi-v">'+(avgEff!=null?avgEff+'%':'--')+'</div><div class="ckpi-l">Efficacite moyenne</div></div><div class="ckpi"><div class="ckpi-v">'+dose+'</div><div class="ckpi-l">Dose actuelle</div></div></div><div class="cdate">'+today+'</div></div><div class="tabs-wrap"><div class="tabs"><button class="tab '+(currentTab==='overview'?'active':'')+'" onclick="switchTab(\'overview\')">Chiffres cles</button><button class="tab '+(currentTab==='analyses'?'active':'')+'" onclick="switchTab(\'analyses\')">Analyses</button></div></div><div id="page-content">'+pageContent+'</div></div>';

  const fDateMin=document.getElementById('f_dateMin');
  const fDateMax=document.getElementById('f_dateMax');
  const fPrise=document.getElementById('f_prise');
  const fDose=document.getElementById('f_dose');
  const fTrait=document.getElementById('f_traitement');
  if(fPrise){fPrise.value=filterState.prise;fPrise.addEventListener('change',e=>{filterState.prise=e.target.value;renderDashboard();});}
  if(fDose){fDose.value=filterState.dose;fDose.addEventListener('change',e=>{filterState.dose=e.target.value;renderDashboard();});}
  if(fTrait){fTrait.value=filterState.traitement;fTrait.addEventListener('change',e=>{filterState.traitement=e.target.value;renderDashboard();});}
  if(fDateMin){fDateMin.addEventListener('change',e=>{filterState.dateMin=e.target.value?new Date(e.target.value):null;renderDashboard();});}
  if(fDateMax){fDateMax.addEventListener('change',e=>{filterState.dateMax=e.target.value?new Date(e.target.value):null;renderDashboard();});}

  if(currentTab==='overview'){
    initCalMonthIdx();buildCalendar('cal-container',rows,effets);
    const effS=getEffSeries(granEff);
    const avgAnnotation={avg:{type:'line',xMin:-0.5,xMax:effS.labels.length-0.5,yMin:avgEff,yMax:avgEff,borderColor:'transparent',label:{display:true,content:'moy. '+(avgEff!=null?avgEff:'--')+'%',position:'end',color:'#82B2C0',font:{size:11},backgroundColor:'transparent',padding:0}}};
    mkChart('c_eff',{type:'line',data:{labels:effS.labels,datasets:[{data:effS.data,borderColor:'#82B2C0',backgroundColor:'rgba(130,178,192,0.07)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#82B2C0',borderWidth:2,spanGaps:false},{data:Array(effS.labels.length).fill(avgEff),borderColor:'#82B2C044',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>ctx.raw!=null?(ctx.datasetIndex===0?'Efficacite':'Moy.')+' : '+Math.round(ctx.raw)+'%':null}},annotation:{annotations:avgAnnotation}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:8,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:v=>v+'%',maxTicksLimit:5},grid:{color:gc},min:0,max:70}}}});
    const heureS=getHeureSeries(granHeure);
    const annots=granHeure==='jour'?annotations:{};
    mkChart('c_heure',{type:'line',data:{labels:heureS.labels,datasets:[{label:'Heure prise',data:heureS.prise,borderColor:'#C3DEDD',tension:0.4,pointRadius:3,borderWidth:2,fill:false,spanGaps:false,yAxisID:'y'},{label:'Heure coucher',data:heureS.coucher,borderColor:'#F6C7B3',tension:0.4,pointRadius:3,borderWidth:2,fill:false,spanGaps:false,borderDash:[4,3],yAxisID:'y2'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:tooltipH,annotation:{annotations:annots}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:8,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},padding:8,callback:fmtH,maxTicksLimit:5},grid:{color:gc},min:500,max:780},y2:{position:'right',ticks:{color:tc,font:{size:10},padding:8,callback:fmtH,maxTicksLimit:5},grid:{display:false},min:0,max:220}}}});
    const fcS=getFCSeries(granFC);
    mkChart('c_fc',{type:'line',data:{labels:fcS.labels,datasets:[{label:'FC repos',data:fcS.fc,borderColor:'#82B2C0',tension:0.4,pointRadius:3,borderWidth:2,fill:false,spanGaps:false},{label:'Plage min',data:fcS.min,borderColor:'#DCECE9',tension:0.4,pointRadius:0,borderWidth:1.5,borderDash:[4,3],fill:false,spanGaps:false},{label:'Plage max',data:fcS.max,borderColor:'#F6C7B3',tension:0.4,pointRadius:0,borderWidth:1.5,borderDash:[4,3],fill:false,spanGaps:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>ctx.raw!=null?ctx.dataset.label+': '+Math.round(ctx.raw)+' bpm':null}}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:8,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},padding:8,callback:v=>v+' bpm',maxTicksLimit:5},grid:{color:gc}}}}});
  }
}

function switchTab(tab){currentTab=tab;renderDashboard();}
startWithKey();
</script>
