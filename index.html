<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi traitement TDAH</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1117;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;}
.app{max-width:960px;margin:0 auto;padding:0 20px 60px;}

.key-wrap{max-width:440px;margin:0 auto;padding:60px 20px;}
.key-box{background:#1a1e2e;border:0.5px solid #378ADD44;border-radius:14px;padding:28px 24px;}
.key-title{font-size:20px;font-weight:500;color:#fff;margin-bottom:6px;}
.key-sub{font-size:13px;color:#666;margin-bottom:22px;line-height:1.6;}
.key-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.key-input{background:#0f1117;border:0.5px solid #378ADD44;border-radius:8px;padding:10px 14px;font-size:13px;color:#fff;width:100%;margin-bottom:12px;font-family:'DM Mono',monospace;outline:none;}
.key-input:focus{border-color:#378ADD88;}
.key-btn{background:#378ADD;border:none;border-radius:8px;padding:12px 20px;font-size:13px;color:#fff;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;font-weight:500;}
.key-btn:hover{background:#2a70bb;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid #ffffff15;border-top:2px solid #378ADD;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-text{font-size:13px;color:#555;}
.error-box{background:#2a1010;border:0.5px solid #D85A3044;border-radius:12px;padding:16px;margin:20px 0;font-size:13px;color:#F09595;line-height:1.6;}

.cover{background:#0d1629;padding:28px 32px 24px;border-radius:0 0 16px 16px;margin-bottom:20px;}
.cover-inner{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.mol{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;color:#378ADD88;margin-bottom:6px;}
.ctitle{font-size:26px;font-weight:500;color:#fff;margin-bottom:3px;}
.csub{font-size:13px;color:#378ADD66;margin-bottom:16px;}
.ckpis{display:flex;gap:10px;}
.ckpi{background:#0C447C22;border:0.5px solid #378ADD22;border-radius:10px;padding:10px 16px;text-align:center;min-width:90px;}
.ckpi-v{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:#85B7EB;}
.ckpi-l{font-size:11px;color:#378ADD55;margin-top:2px;}
.cdate{font-size:11px;color:#378ADD33;margin-top:8px;}
.cover-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}

.tabs{display:flex;gap:4px;margin-bottom:16px;background:#161920;border-radius:10px;padding:4px;}
.tab{flex:1;text-align:center;padding:10px 16px;font-size:13px;color:#666;cursor:pointer;border-radius:8px;transition:all 0.2s;border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.tab.active{background:#1e2235;color:#fff;}
.tab:hover:not(.active){color:#aaa;}

.refresh-btn{background:transparent;border:0.5px solid #378ADD33;border-radius:8px;padding:7px 14px;font-size:11px;color:#378ADD66;cursor:pointer;font-family:'DM Sans',sans-serif;}
.refresh-btn:hover{border-color:#378ADD;color:#378ADD;}

.filters{background:#161920;border:0.5px solid #ffffff08;border-radius:10px;padding:14px 16px;margin-bottom:16px;}
.filters-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.filters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;}
.filter-pill{background:#1e2235;border:0.5px solid #ffffff0f;border-radius:8px;padding:8px 12px;font-size:12px;color:#aaa;width:100%;cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;}
.date-wrap{display:flex;flex-direction:column;gap:3px;}
.date-label{font-size:10px;color:#444;}
.date-input{background:#1e2235;border:0.5px solid #ffffff0f;border-radius:8px;padding:7px 10px;font-size:12px;color:#aaa;width:100%;outline:none;font-family:'DM Sans',sans-serif;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr;}.cover-inner{flex-direction:column;}.ckpis{flex-wrap:wrap;}}

.sec{margin-bottom:24px;}
.slabel{font-size:10px;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.kcard{border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.kcard.g{background:#04342C;border-left:3px solid #1D9E75;}
.kcard.b{background:#042C53;border-left:3px solid #378ADD;}
.kcard.o{background:#4A1B0C;border-left:3px solid #D85A30;}
.klabel{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
.kval{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;}
.kval.g{color:#1D9E75;}.kval.b{color:#378ADD;}.kval.o{color:#D85A30;}
.ksub{font-size:12px;color:#555;margin-top:4px;}
.ksub .hi{color:#1D9E75;}.ksub .lo{color:#D85A30;}.ksub .bl{color:#378ADD;}

.mini{background:#1e2235;border-radius:10px;padding:13px 14px;}
.mini-l{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.mini-v{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;}

.chart-card{background:#1a1e2e;border:0.5px solid #ffffff08;border-radius:10px;padding:16px;margin-bottom:12px;}
.ct{font-size:12px;color:#777;margin-bottom:10px;}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px;font-size:11px;color:#666;}
.legend span{display:flex;align-items:center;gap:5px;}
.lsq{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-name{font-size:12px;color:#aaa;width:130px;flex-shrink:0;}
.bar-track{flex:1;background:#ffffff08;border-radius:3px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.bar-v{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;width:28px;text-align:right;flex-shrink:0;}

.occs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.occ{background:#1e2235;border-radius:10px;padding:14px;text-align:center;}
.occ-v{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;}
.occ-l{font-size:11px;color:#555;margin-top:3px;}
.no-data{font-size:12px;color:#555;text-align:center;padding:24px 0;}
.divider{border:none;border-top:0.5px solid #ffffff08;margin:8px 0 20px;}

.insight{font-size:12px;color:#888;margin-top:10px;padding-top:10px;border-top:0.5px solid #ffffff08;line-height:1.6;}
.insight.pos{color:#1D9E75;}.insight.warn{color:#EF9F27;}.insight.neu{color:#378ADD;}
.disclaimer{background:#2a2010;border-left:3px solid #EF9F27;border-radius:0;border-top-right-radius:8px;border-bottom-right-radius:8px;padding:10px 14px;font-size:12px;color:#FAC775;line-height:1.5;margin-bottom:20px;}
</style>
</head>
<body>
<div id="root"></div>

<script>
const SHEET_ID='1BZWdgCe6JFlP8yVGkcjuqke0TDeqrbvhXUhaJy1NpxM';
const gc='rgba(255,255,255,0.06)';const tc='#555';
let charts=[];let rawData=[];let rawEffets=[];let currentTab='overview';
const MOIS=['jan.','fév.','mar.','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];

function formatDate(str){if(!str)return '--';const p=str.split('/');if(p.length<3)return str;return `${parseInt(p[0])} ${MOIS[parseInt(p[1])-1]} ${p[2]}`;}
function toMin(str){if(!str)return null;const p=str.toString().trim().split(':');if(p.length<2)return null;const h=parseInt(p[0]);const m=parseInt(p[1]);if(isNaN(h)||isNaN(m))return null;return h*60+m;}
function minToStr(m){if(m==null||isNaN(m))return '--';const h=Math.floor(m/60);const mn=Math.round(m%60);return h.toString().padStart(2,'0')+':'+mn.toString().padStart(2,'0');}
function parseNum(v){if(v==null||v==='')return null;const n=parseFloat(v.toString().replace(',','.'));return isNaN(n)?null:n;}
function avg(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function stddev(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));if(v.length<2)return null;const m=avg(v);return Math.round(Math.sqrt(v.reduce((s,x)=>s+(x-m)**2,0)/v.length));}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;const c=new Chart(el,cfg);charts.push(c);}
function getField(row,...keys){for(const k of keys){if(row[k]!==undefined&&row[k]!=='')return row[k];}return null;}
function parseDateStr(str){if(!str)return null;const p=str.split('/');if(p.length<3)return null;return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
function destroyCharts(){charts.forEach(c=>{try{c.destroy();}catch(e){}});charts=[];}
const fmtH=v=>{if(v==null||typeof v!=='number')return null;const h=Math.floor(v/60);const m=v%60;return h+'h'+(m<10?'0':'')+m;};
const tooltipH={callbacks:{label:ctx=>{const v=ctx.raw;if(v==null||typeof v!=='number')return null;return fmtH(v);}}};

const savedKey=localStorage.getItem('mph_api_key');

async function fetchSheet(apiKey,sheetName){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`;
  const r=await fetch(url);
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Erreur '+r.status);}
  const d=await r.json();
  if(!d.values||d.values.length<2)return[];
  const[headers,...rows]=d.values;
  return rows.map(row=>{const o={};headers.forEach((h,i)=>o[h.trim()]=row[i]||'');return o;});
}

function showKeyForm(){
  document.getElementById('root').innerHTML=`
<div class="key-wrap">
  <div class="key-box">
    <div class="key-title">Suivi traitement TDAH</div>
    <div class="key-sub">Entre ta clé API Google Sheets pour charger tes données. Elle sera sauvegardée localement sur cet appareil.</div>
    <div class="key-label">Clé API Google Sheets</div>
    <input class="key-input" id="api_key_input" type="password" placeholder="AIza..." autocomplete="off" value="${savedKey||''}"/>
    <button class="key-btn" onclick="startWithKey()">Charger le dashboard</button>
  </div>
</div>`;
}

async function startWithKey(){
  const apiKey=(document.getElementById('api_key_input')||{value:savedKey||''}).value.trim();
  if(!apiKey)return;
  localStorage.setItem('mph_api_key',apiKey);
  document.getElementById('root').innerHTML='<div class="loading"><div class="spinner"></div><div class="load-text">Connexion à Google Sheets…</div></div>';
  try{
    [rawData,rawEffets]=await Promise.all([fetchSheet(apiKey,'DATA'),fetchSheet(apiKey,'Effets')]);
    renderDashboard();
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="key-wrap"><div class="error-box">Impossible de charger les données.<br><br>${e.message}</div><div class="key-box"><div class="key-label">Réessayer</div><input class="key-input" id="api_key_input" type="password" placeholder="AIza..."/><button class="key-btn" onclick="startWithKey()">Réessayer</button></div></div>`;
  }
}

const filterState={prise:'all',dose:'all',traitement:'all',dateMin:null,dateMax:null};

function getFiltered(){
  return rawData.filter(r=>{
    if(!r.jour||!r.jour.trim())return false;
    if(filterState.prise!=='all'&&r.prise!==filterState.prise)return false;
    if(filterState.dose!=='all'&&r.dose!==filterState.dose)return false;
    if(filterState.traitement!=='all'&&r.traitement!==filterState.traitement)return false;
    if(filterState.dateMin||filterState.dateMax){
      const d=parseDateStr(r.jour);if(!d)return false;
      if(filterState.dateMin&&d<filterState.dateMin)return false;
      if(filterState.dateMax&&d>filterState.dateMax)return false;
    }
    return true;
  });
}

function getFilteredEffets(rows){const dates=new Set(rows.map(r=>r.jour));return rawEffets.filter(e=>dates.has(e.date));}

function renderDashboard(){
  destroyCharts();
  const rows=getFiltered();
  const effets=getFilteredEffets(rows);
  const allRows=rawData.filter(r=>r.jour&&r.jour.trim());
  const doses=[...new Set(allRows.map(r=>r.dose).filter(Boolean))];
  const traitements=[...new Set(allRows.map(r=>r.traitement).filter(Boolean))];
  const n=rows.length;
  const nPrise=rows.filter(r=>r.prise==='Oui').length;
  const traitement=allRows.length?(allRows[allRows.length-1].traitement||'Méthylphénidate'):'Méthylphénidate';
  const dose=allRows.length?(allRows[allRows.length-1].dose||'18mg'):'18mg';
  const type=allRows.length?(allRows[allRows.length-1].type||'Générique'):'Générique';
  const today=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const effVals=rows.map(r=>parseNum(getField(r,'efficacite_auto-rapportee'))).filter(v=>v!=null);
  const avgEff=effVals.length?Math.round(avg(effVals)*100):null;
  const maxEff=effVals.length?Math.max(...effVals):null;
  const minEff=effVals.length?Math.min(...effVals):null;
  const bestIdx=effVals.length?effVals.indexOf(maxEff):-1;
  const worstIdx=effVals.length?effVals.indexOf(minEff):-1;

  const priseVals=rows.map(r=>toMin(r.heure_prise)).filter(v=>v!=null);
  const avgPrise=avg(priseVals);
  const minPrise=priseVals.length?Math.min(...priseVals):null;
  const maxPrise=priseVals.length?Math.max(...priseVals):null;
  const stdPrise=stddev(priseVals);
  const coucherVals=rows.map(r=>{const v=parseNum(r.coucher_min);return(v!=null&&v>0)?v:null;}).filter(v=>v!=null);
  const avgCoucher=avg(coucherVals);
  const fcVals=rows.map(r=>parseNum(r.fq_repos_moy)).filter(v=>v!=null);
  const avgFC=fcVals.length?Math.round(avg(fcVals)):null;
  const minFC=fcVals.length?Math.min(...fcVals):null;
  const maxFC=fcVals.length?Math.max(...fcVals):null;
  const avgPlageMin=Math.round(avg(rows.map(r=>parseNum(r.plage_min)).filter(v=>v!=null)));
  const avgPlageMax=Math.round(avg(rows.map(r=>parseNum(r.plage_max)).filter(v=>v!=null)));

  const effetsPos=effets.filter(e=>e.type==='positif');
  const effetsNeg=effets.filter(e=>e.type==='négatif'||e.type==='negatif');
  const countByEffet=arr=>{const m={};arr.forEach(e=>{const k=e.effet||'';m[k]=(m[k]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
  const posCount=countByEffet(effetsPos);
  const negCount=countByEffet(effetsNeg);
  const maxPos=posCount.length?posCount[0][1]:1;
  const maxNeg=negCount.length?negCount[0][1]:1;

  const shortDates=rows.map(r=>{const p=r.jour.split('/');return p.length>=2?p[0]+'/'+p[1]:r.jour;});
  const effSerie=rows.map(r=>{const v=parseNum(getField(r,'efficacite_auto-rapportee'));return v!=null?Math.round(v*100):null;});
  const priseSerie=rows.map(r=>toMin(r.heure_prise));
  const coucherSerie=rows.map(r=>{const v=parseNum(r.coucher_min);return(v!=null&&v>0)?v:null;});
  const fcSerie=rows.map(r=>parseNum(r.fq_repos_moy));
  const pMinSerie=rows.map(r=>parseNum(r.plage_min));
  const pMaxSerie=rows.map(r=>parseNum(r.plage_max));

  const reg=stdPrise==null?'--':stdPrise<=20?'Très régulier':stdPrise<=40?'Régulier':stdPrise<=60?'Irrégulier':'Très irrégulier';
  const regColor=stdPrise!=null&&stdPrise<=40?'#1D9E75':'#D85A30';

  const annotations={};
  shortDates.forEach((l,i)=>{
    const t=rows[i]?rows[i]['jour_travaillé']||rows[i].jour_travaille:null;
    if(t==='0'||t===0){annotations['box'+i]={type:'box',xMin:i-0.5,xMax:i+0.5,backgroundColor:'rgba(255,255,255,0.07)',borderColor:'rgba(255,255,255,0.12)',borderWidth:1};}
  });

  const filtersHTML=`
<div class="filters">
  <div class="filters-label">Filtres</div>
  <div class="filters-grid">
    <div class="date-wrap"><div class="date-label">Du</div><input class="date-input" type="date" id="f_dateMin"/></div>
    <div class="date-wrap"><div class="date-label">Au</div><input class="date-input" type="date" id="f_dateMax"/></div>
    <select class="filter-pill" id="f_prise"><option value="all">Toutes les prises</option><option value="Oui">Avec prise</option><option value="Non">Sans prise</option></select>
    <select class="filter-pill" id="f_dose"><option value="all">Toutes les doses</option>${doses.map(d=>`<option value="${d}">${d}</option>`).join('')}</select>
    <select class="filter-pill" id="f_traitement"><option value="all">Tous les traitements</option>${traitements.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
  </div>
</div>`;

  let pageContent='';

  if(currentTab==='overview'){
    pageContent=`
${filtersHTML}
<div class="sec">
  <div class="slabel">Efficacité du traitement</div>
  <div class="kcard g">
    <div class="klabel">Efficacité moyenne</div>
    <div class="kval g">${avgEff!=null?avgEff+'%':'--'}</div>
    <div class="ksub">sur <span class="hi">${nPrise}</span> jour${nPrise>1?'s':''} avec prise</div>
  </div>
  <div class="grid2">
    <div class="mini"><div class="mini-l">Meilleur jour</div><div class="mini-v" style="color:#1D9E75;font-size:14px;">${bestIdx>=0?formatDate(rows[bestIdx].jour):'--'}</div><div style="font-size:11px;color:#555;margin-top:3px;">${bestIdx>=0?Math.round(maxEff*100)+'%':''}</div></div>
    <div class="mini"><div class="mini-l">Pire jour</div><div class="mini-v" style="color:#D85A30;font-size:14px;">${worstIdx>=0?formatDate(rows[worstIdx].jour):'--'}</div><div style="font-size:11px;color:#555;margin-top:3px;">${worstIdx>=0?Math.round(minEff*100)+'%':''}</div></div>
  </div>
  <div class="chart-card">
    <div class="ct">Évolution de l'efficacité</div>
    <div style="position:relative;width:100%;height:160px;"><canvas id="c_eff"></canvas></div>
  </div>
</div>
<div class="divider"></div>
<div class="sec">
  <div class="slabel">Heure de la prise</div>
  <div class="kcard b">
    <div class="klabel">Heure moyenne</div>
    <div class="kval b">${minToStr(avgPrise)}</div>
    <div class="ksub">min <span class="hi">${minToStr(minPrise)}</span> · max <span class="lo">${minToStr(maxPrise)}</span> · écart-type <span class="bl">${stdPrise!=null?stdPrise+' min':'--'}</span></div>
  </div>
  <div class="grid2">
    <div class="mini"><div class="mini-l">Régularité</div><div class="mini-v" style="color:${regColor};font-size:14px;">${reg}</div></div>
    <div class="mini"><div class="mini-l">Coucher moyen</div><div class="mini-v" style="color:#378ADD;font-size:14px;">${minToStr(avgCoucher)}</div></div>
  </div>
  <div class="chart-card">
    <div class="ct">Suivi horaire prise & coucher</div>
    <div class="legend"><span><span class="lsq" style="background:#378ADD;"></span>Heure prise</span><span><span class="lsq" style="background:#D85A30;"></span>Heure coucher</span><span><span class="lsq" style="background:#ffffff18;border:0.5px solid #ffffff33;"></span>Jour non-travaillé</span></div>
    <div style="position:relative;width:100%;height:180px;"><canvas id="c_heure"></canvas></div>
  </div>
</div>
<div class="divider"></div>
<div class="sec">
  <div class="slabel">Fréquence cardiaque</div>
  <div class="kcard o">
    <div class="klabel">FC moyenne au repos</div>
    <div class="kval o">${avgFC!=null?avgFC:'--'} <span style="font-size:16px;color:#888;">bpm</span></div>
    <div class="ksub">min <span class="hi">${minFC!=null?minFC:'--'}</span> · max <span class="lo">${maxFC!=null?maxFC:'--'}</span></div>
  </div>
  <div class="grid2">
    <div class="mini"><div class="mini-l">Plage min moy.</div><div class="mini-v" style="color:#378ADD;">${!isNaN(avgPlageMin)?avgPlageMin+' bpm':'--'}</div></div>
    <div class="mini"><div class="mini-l">Plage max moy.</div><div class="mini-v" style="color:#D85A30;">${!isNaN(avgPlageMax)?avgPlageMax+' bpm':'--'}</div></div>
  </div>
  <div class="chart-card">
    <div class="legend"><span><span class="lsq" style="background:#378ADD;"></span>FC repos</span><span><span class="lsq" style="border:1px dashed #1D9E75;background:transparent;"></span>Plage min</span><span><span class="lsq" style="border:1px dashed #D85A30;background:transparent;"></span>Plage max</span></div>
    <div style="position:relative;width:100%;height:160px;"><canvas id="c_fc"></canvas></div>
  </div>
</div>
<div class="divider"></div>
<div class="sec">
  <div class="slabel">Effets du traitement</div>
  <div class="occs">
    <div class="occ"><div class="occ-v" style="color:#1D9E75;">${effetsPos.length}</div><div class="occ-l">Occurrences positives</div></div>
    <div class="occ"><div class="occ-v" style="color:#D85A30;">${effetsNeg.length}</div><div class="occ-l">Occurrences négatives</div></div>
  </div>
  <div class="grid2">
    <div class="chart-card">
      <div class="ct" style="color:#1D9E75;">Impacts positifs</div>

  </div>
</div>`;
  } else {
    const priseMinArr=rows.map(r=>toMin(r.heure_prise)).filter(v=>v!=null);

    const travRows=rows.filter(r=>r['jour_travaillé']==='1'||r.jour_travaille==='1');
    const nonTravRows=rows.filter(r=>r['jour_travaillé']==='0'||r.jour_travaille==='0');

    const effDist={};effPctArr.forEach(v=>{const k=Math.round(v*100/10)*10;effDist[k]=(effDist[k]||0)+1;});
    const distLabels=Object.keys(effDist).sort((a,b)=>a-b).map(k=>k+'%');
    const distData=Object.keys(effDist).sort((a,b)=>a-b).map(k=>effDist[k]);

    const sem1=rows.slice(0,Math.floor(rows.length/2));
    const sem2=rows.slice(Math.floor(rows.length/2));
    const avgEff1=sem1.length?Math.round(avg(sem1.map(r=>parseNum(getField(r,'efficacite_auto-rapportee'))).filter(v=>v!=null))*100):null;
    const avgEff2=sem2.length?Math.round(avg(sem2.map(r=>parseNum(getField(r,'efficacite_auto-rapportee'))).filter(v=>v!=null))*100):null;
    const tendance=avgEff1!=null&&avgEff2!=null?(avgEff2>avgEff1?'En hausse ↑':'En baisse ↓'):null;
    const tendanceColor=tendance&&tendance.includes('↑')?'#1D9E75':'#D85A30';

    pageContent=`

<div class="sec">
  <div class="slabel">Tendance générale</div>
  <div class="grid3">
    <div class="mini"><div class="mini-l">Efficacité moy.</div><div class="mini-v" style="color:#1D9E75;">${avgEff!=null?avgEff+'%':'--'}</div></div>
    <div class="mini"><div class="mini-l">Tendance</div><div class="mini-v" style="color:${tendanceColor};font-size:15px;">${tendance||'--'}</div></div>
    <div class="mini"><div class="mini-l">Régularité prise</div><div class="mini-v" style="color:${regColor};font-size:14px;">${reg}</div></div>
  </div>
</div>
<div class="divider"></div>
<div class="sec">
  <div class="slabel">Corrélations</div>
  <div class="grid2">
    <div class="chart-card">
      <div class="ct">Heure de prise → efficacité</div>
      <div style="position:relative;width:100%;height:200px;"><canvas id="sc1"></canvas></div>
      <div class="insight neu">Tendance exploratoire — données insuffisantes pour conclure.</div>
    </div>
    <div class="chart-card">
      <div class="ct">Heure de prise → heure de coucher</div>
      <div style="position:relative;width:100%;height:200px;"><canvas id="sc2"></canvas></div>
      <div class="insight neu">Pas de corrélation claire — le type de jour semble plus déterminant.</div>
    </div>
    <div class="chart-card">
      <div class="ct">FC au repos → efficacité</div>
      <div style="position:relative;width:100%;height:200px;"><canvas id="sc3"></canvas></div>
      <div class="insight neu">Pas de relation évidente entre FC et efficacité ressentie.</div>
    </div>
    <div class="chart-card">
      <div class="ct">Distribution de l'efficacité</div>
      <div style="position:relative;width:100%;height:200px;"><canvas id="dist1"></canvas></div>
      <div class="insight pos">Efficacité concentrée entre 30% et 40%.</div>
    </div>
  </div>
</div>
<div class="divider"></div>
<div class="sec">
  <div class="slabel">Jours travaillés vs non-travaillés</div>
  <div class="grid2">
    <div class="chart-card">
      <div class="ct">Heure de coucher moyenne</div>
      <div style="position:relative;width:100%;height:180px;"><canvas id="comp1"></canvas></div>
      <div class="insight warn">Coucher ${Math.abs(avgCoucherNonTrav-avgCoucherTrav)} min plus ${avgCoucherNonTrav>avgCoucherTrav?'tardif':'tôt'} les jours non-travaillés.</div>
    </div>
    <div class="chart-card">
      <div class="ct">Efficacité moyenne</div>
      <div style="position:relative;width:100%;height:180px;"><canvas id="comp2"></canvas></div>
      <div class="insight warn">Efficacité ressentie ${avgEffTrav&&avgEffNonTrav?Math.abs(avgEffTrav-avgEffNonTrav)+'% ':''} ${avgEffTrav>avgEffNonTrav?'plus élevée les jours travaillés':'plus élevée les jours non-travaillés'}. Biais de perception probable.</div>
    </div>
  </div>
</div>
<div class="sec">
  <div class="slabel">Limites de l'analyse</div>
  <div class="chart-card" style="background:#2a1f10;">
    <div style="font-size:12px;color:#FAC775;line-height:2;">
      · Données auto-rapportées — biais de perception possible<br>
      · n=${nPrise} jours — aucune corrélation statistiquement significative<br>
      · Pas de groupe contrôle sans traitement<br>
      · Efficacité influencée par des facteurs externes non mesurés<br>
      · Une seule dose testée — comparaison inter-doses à venir
    </div>
  </div>
</div>`;

    setTimeout(()=>{
      mkChart('sc1',{type:'scatter',data:{datasets:[{data:scatterPriseEff,backgroundColor:'#378ADD99',pointRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9},callback:fmtH},grid:{color:gc},min:500,max:750},y:{ticks:{color:tc,font:{size:9},callback:v=>v+'%'},grid:{color:gc},min:0,max:70}}}});
      mkChart('sc2',{type:'scatter',data:{datasets:[{data:scatterPriseCoucher,backgroundColor:'#D85A3099',pointRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9},callback:fmtH},grid:{color:gc},min:500,max:750},y:{ticks:{color:tc,font:{size:9},callback:fmtH},grid:{color:gc},min:0,max:200}}}});
      mkChart('sc3',{type:'scatter',data:{datasets:[{data:scatterFCEff,backgroundColor:'#EF9F2799',pointRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9},callback:v=>v+' bpm'},grid:{color:gc},min:58,max:82},y:{ticks:{color:tc,font:{size:9},callback:v=>v+'%'},grid:{color:gc},min:0,max:70}}}});
      mkChart('dist1',{type:'bar',data:{labels:distLabels,datasets:[{data:distData,backgroundColor:'#1D9E75aa',borderWidth:0,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},stepSize:1},grid:{color:gc}}}}});
      mkChart('comp1',{type:'bar',data:{labels:['Travaillé','Non-travaillé'],datasets:[{data:[avgCoucherTrav,avgCoucherNonTrav],backgroundColor:['#378ADDaa','#888780aa'],borderWidth:0,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},callback:fmtH},grid:{color:gc},min:Math.min(avgCoucherTrav,avgCoucherNonTrav)-30,max:Math.max(avgCoucherTrav,avgCoucherNonTrav)+30}}}});
      mkChart('comp2',{type:'bar',data:{labels:['Travaillé','Non-travaillé'],datasets:[{data:[avgEffTrav,avgEffNonTrav],backgroundColor:['#1D9E75aa','#888780aa'],borderWidth:0,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},callback:v=>v+'%'},grid:{color:gc},min:0,max:50}}}});
    },100);

      {data:Array(rows.length).fill(avgEff),borderColor:'#1D9E7555',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9},maxTicksLimit:8,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},callback:v=>v+'%'},grid:{color:gc},min:0,max:70}}}});

    mkChart('c_heure',{type:'line',data:{labels:shortDates,datasets:[
      {data:priseSerie,borderColor:'#378ADD',tension:0.4,pointRadius:3,pointBackgroundColor:'#378ADD',borderWidth:2,fill:false,spanGaps:false,yAxisID:'y'},

    mkChart('c_fc',{type:'line',data:{labels:shortDates,datasets:[
      {data:fcSerie,borderColor:'#378ADD',tension:0.4,pointRadius:2,borderWidth:2,fill:false},
      {data:pMinSerie,borderColor:'#1D9E75',tension:0.4,pointRadius:0,borderWidth:1.5,borderDash:[4,3],fill:false},
      {data:pMaxSerie,borderColor:'#D85A30',tension:0.4,pointRadius:0,borderWidth:1.5,borderDash:[4,3],fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9},maxTicksLimit:8,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},padding:8,callback:v=>v+' bpm'},grid:{color:gc}}}}});
  }
}

if(savedKey){startWithKey();}else{showKeyForm();}
