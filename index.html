<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi traitement TDAH</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1117;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;}
.app{max-width:420px;margin:0 auto;padding-bottom:40px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid #ffffff15;border-top:2px solid #378ADD;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-text{font-size:13px;color:#555;}
.error-box{background:#2a1010;border:0.5px solid #D85A3044;border-radius:12px;padding:16px;margin:20px;font-size:13px;color:#F09595;line-height:1.6;}
.key-box{background:#1a1e2e;border:0.5px solid #378ADD44;border-radius:12px;padding:24px 20px;margin:20px;}
.key-title{font-size:18px;font-weight:500;color:#fff;margin-bottom:6px;}
.key-sub{font-size:13px;color:#666;margin-bottom:20px;line-height:1.5;}
.key-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.key-input{background:#0f1117;border:0.5px solid #378ADD44;border-radius:8px;padding:10px 14px;font-size:13px;color:#fff;width:100%;margin-bottom:12px;font-family:'DM Mono',monospace;outline:none;}
.key-input:focus{border-color:#378ADD88;}
.key-btn{background:#378ADD;border:none;border-radius:8px;padding:12px 20px;font-size:13px;color:#fff;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;font-weight:500;}
.key-btn:hover{background:#2a70bb;}
.cover{background:#0d1629;padding:22px 18px 18px;}
.mol{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;color:#378ADD88;margin-bottom:6px;}
.ctitle{font-size:21px;font-weight:500;color:#fff;margin-bottom:2px;}
.csub{font-size:12px;color:#378ADD66;margin-bottom:14px;}
.ckpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.ckpi{background:#0C447C22;border:0.5px solid #378ADD22;border-radius:10px;padding:10px 12px;text-align:center;}
.ckpi-v{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:#85B7EB;}
.ckpi-l{font-size:11px;color:#378ADD55;margin-top:2px;}
.cdate{font-size:11px;color:#378ADD33;text-align:center;}
.filters{background:#161920;border:0.5px solid #ffffff0a;border-radius:10px;padding:12px;margin:14px 18px 0;}
.filters-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.filter-pill{background:#1e2235;border:0.5px solid #ffffff0f;border-radius:8px;padding:8px 12px;font-size:12px;color:#aaa;width:100%;margin-bottom:6px;cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;}
.filter-pill:last-child{margin-bottom:0;}
.sec{padding:16px 18px 0;}
.slabel{font-size:10px;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.kcard{border-radius:10px;padding:13px 15px;margin-bottom:10px;}
.kcard.g{background:#04342C;border-left:3px solid #1D9E75;}
.kcard.b{background:#042C53;border-left:3px solid #378ADD;}
.kcard.o{background:#4A1B0C;border-left:3px solid #D85A30;}
.klabel{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
.kval{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;}
.kval.g{color:#1D9E75;}.kval.b{color:#378ADD;}.kval.o{color:#D85A30;}
.ksub{font-size:11px;color:#555;margin-top:3px;}
.ksub .hi{color:#1D9E75;}.ksub .lo{color:#D85A30;}.ksub .bl{color:#378ADD;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.mini{background:#1e2235;border-radius:10px;padding:12px;}
.mini-l{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.mini-v{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;}
.chart-card{background:#1a1e2e;border:0.5px solid #ffffff08;border-radius:10px;padding:14px 15px;margin-bottom:10px;}
.ct{font-size:11px;color:#666;margin-bottom:10px;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;font-size:11px;color:#666;}
.legend span{display:flex;align-items:center;gap:4px;}
.lsq{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-name{font-size:12px;color:#aaa;width:120px;flex-shrink:0;}
.bar-track{flex:1;background:#ffffff08;border-radius:3px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.bar-v{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;width:24px;text-align:right;flex-shrink:0;}
.divider{border:none;border-top:0.5px solid #ffffff08;margin:6px 0 0;}
.occs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.occ{background:#1e2235;border-radius:10px;padding:12px;text-align:center;}
.occ-v{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;}
.occ-l{font-size:11px;color:#555;margin-top:2px;}
.no-data{font-size:12px;color:#555;text-align:center;padding:20px 0;}
.refresh-btn{background:transparent;border:0.5px solid #378ADD44;border-radius:8px;padding:8px 14px;font-size:11px;color:#378ADD88;cursor:pointer;margin:14px 18px 0;display:block;width:calc(100% - 36px);}
.refresh-btn:hover{border-color:#378ADD;color:#378ADD;}
</style>
</head>
<body>
<div class="app" id="app">
  <div style="padding:40px 20px 20px;">
    <div class="key-box">
      <div class="key-title">Suivi traitement TDAH</div>
      <div class="key-sub">Entre ta clé API Google Sheets pour charger tes données. Elle sera sauvegardée localement sur cet appareil.</div>
      <div class="key-label">Clé API Google Sheets</div>
      <input class="key-input" id="api_key_input" type="password" placeholder="AIza..." autocomplete="off"/>
      <button class="key-btn" onclick="startWithKey()">Charger le dashboard</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID='1BZWdgCe6JFlP8yVGkcjuqke0TDeqrbvhXUhaJy1NpxM';
const gc='rgba(255,255,255,0.06)';
const tc='#555';
let charts=[];

const savedKey=localStorage.getItem('mph_api_key');
if(savedKey){
  document.getElementById('api_key_input').value=savedKey;
}

function destroyCharts(){charts.forEach(c=>{try{c.destroy();}catch(e){}});charts=[];}

function toMin(str){
  if(!str)return null;
  const p=str.toString().trim().split(':');
  if(p.length<2)return null;
  const h=parseInt(p[0]);const m=parseInt(p[1]);
  if(isNaN(h)||isNaN(m))return null;
  return h*60+m;
}

function minToStr(m){
  if(m==null||isNaN(m))return '--';
  const h=Math.floor(m/60);const mn=Math.round(m%60);
  return h.toString().padStart(2,'0')+':'+mn.toString().padStart(2,'0');
}

function avg(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function stddev(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));if(v.length<2)return null;const m=avg(v);return Math.round(Math.sqrt(v.reduce((s,x)=>s+(x-m)**2,0)/v.length));}

function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;const c=new Chart(el,cfg);charts.push(c);}

function getField(row,...keys){for(const k of keys){if(row[k]!==undefined&&row[k]!=='')return row[k];}return null;}

async function fetchSheet(apiKey,sheetName){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`;
  const r=await fetch(url);
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Erreur '+r.status);}
  const d=await r.json();
  if(!d.values||d.values.length<2)return[];
  const[headers,...rows]=d.values;
  return rows.map(row=>{const o={};headers.forEach((h,i)=>o[h.trim()]=row[i]||'');return o;});
}

async function startWithKey(){
  const apiKey=document.getElementById('api_key_input').value.trim();
  if(!apiKey)return;
  localStorage.setItem('mph_api_key',apiKey);
  document.getElementById('app').innerHTML='<div class="loading"><div class="spinner"></div><div class="load-text">Connexion à Google Sheets…</div></div>';
  try{
    const[rawData,rawEffets]=await Promise.all([fetchSheet(apiKey,'DATA'),fetchSheet(apiKey,'Effets')]);
    init(rawData,rawEffets,apiKey);
  }catch(e){
    document.getElementById('app').innerHTML=`
      <div style="padding:20px;">
        <div class="error-box">Impossible de charger les données.<br><br>${e.message}<br><br>Vérifie que ta clé API est correcte et que le Sheet est partagé en "Tout le monde peut voir".</div>
        <div class="key-box">
          <div class="key-label">Réessayer avec une autre clé</div>
          <input class="key-input" id="api_key_input" type="password" placeholder="AIza..." value="${apiKey}"/>
          <button class="key-btn" onclick="startWithKey()">Réessayer</button>
        </div>
      </div>`;
  }
}

function init(rawData,rawEffets,apiKey){
  const allRows=rawData.filter(r=>r.jour&&r.jour.trim());
  const filterState={prise:'all',dose:'all',traitement:'all'};
  const doses=[...new Set(allRows.map(r=>r.dose).filter(Boolean))];
  const traitements=[...new Set(allRows.map(r=>r.traitement).filter(Boolean))];

  function getFiltered(){
    return allRows.filter(r=>{
      if(filterState.prise!=='all'&&r.prise!==filterState.prise)return false;
      if(filterState.dose!=='all'&&r.dose!==filterState.dose)return false;
      if(filterState.traitement!=='all'&&r.traitement!==filterState.traitement)return false;
      return true;
    });
  }

  function getFilteredEffets(rows){
    const dates=new Set(rows.map(r=>r.jour));
    return rawEffets.filter(e=>dates.has(e.date));
  }

  function render(){
    destroyCharts();
    const rows=getFiltered();
    const effets=getFilteredEffets(rows);
    const n=rows.length;
    const nPrise=rows.filter(r=>r.prise==='Oui').length;

    const effVals=rows.map(r=>{const v=parseFloat(getField(r,'efficacite_auto-rapportee','efficacite_auto-rapportee'));return isNaN(v)?null:v;}).filter(v=>v!=null);
    const avgEff=effVals.length?Math.round(avg(effVals)*100):null;

    const priseVals=rows.map(r=>toMin(r.heure_prise)).filter(v=>v!=null);
    const avgPrise=avg(priseVals);
    const minPrise=priseVals.length?Math.min(...priseVals):null;
    const maxPrise=priseVals.length?Math.max(...priseVals):null;
    const stdPrise=stddev(priseVals);

    const coucherVals=rows.map(r=>{const v=parseFloat(r.coucher_min);return(!isNaN(v)&&v>0)?v:null;}).filter(v=>v!=null);
    const avgCoucher=avg(coucherVals);

    const fcVals=rows.map(r=>{const v=parseFloat(r.fq_repos_moy);return isNaN(v)?null:v;}).filter(v=>v!=null);
    const avgFC=fcVals.length?Math.round(avg(fcVals)):null;
    const minFC=fcVals.length?Math.min(...fcVals):null;
    const maxFC=fcVals.length?Math.max(...fcVals):null;
    const avgPlageMin=Math.round(avg(rows.map(r=>{const v=parseFloat(r.plage_min);return isNaN(v)?null:v;}).filter(v=>v!=null)));
    const avgPlageMax=Math.round(avg(rows.map(r=>{const v=parseFloat(r.plage_max);return isNaN(v)?null:v;}).filter(v=>v!=null)));

    const effetsPos=effets.filter(e=>e.type==='positif');
    const effetsNeg=effets.filter(e=>e.type==='négatif'||e.type==='negatif');
    const countByEffet=arr=>{const m={};arr.forEach(e=>{const k=e.effet||'';m[k]=(m[k]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
    const posCount=countByEffet(effetsPos);
    const negCount=countByEffet(effetsNeg);
    const maxPos=posCount.length?posCount[0][1]:1;
    const maxNeg=negCount.length?negCount[0][1]:1;

    const shortDates=rows.map(r=>{const p=r.jour.split('/');return p.length>=2?p[0]+'/'+p[1]:r.jour;});
    const effSerie=rows.map(r=>{const v=parseFloat(getField(r,'efficacite_auto-rapportee','efficacite_auto_rapportee'));return isNaN(v)?null:Math.round(v*100);});
    const priseSerie=rows.map(r=>toMin(r.heure_prise));
    const coucherSerie=rows.map(r=>{const v=parseFloat(r.coucher_min);return(!isNaN(v)&&v>0)?v:null;});
    const nonTravSerie=rows.map(r=>{const v=parseFloat(r.coucher_min);const t=r['jour_travaillé']||r.jour_travaille;return(t==='0'||t===0)&&!isNaN(v)&&v>0?v:null;});
    const fcSerie=rows.map(r=>{const v=parseFloat(r.fq_repos_moy);return isNaN(v)?null:v;});
    const pMinSerie=rows.map(r=>{const v=parseFloat(r.plage_min);return isNaN(v)?null:v;});
    const pMaxSerie=rows.map(r=>{const v=parseFloat(r.plage_max);return isNaN(v)?null:v;});

    const today=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const traitement=rows.length?(rows[rows.length-1].traitement||'Méthylphénidate'):'Méthylphénidate';
    const dose=rows.length?(rows[rows.length-1].dose||'18mg'):'18mg';
    const type=rows.length?(rows[rows.length-1].type||'Générique'):'Générique';
    const bestIdx=effVals.length?rows.findIndex(r=>parseFloat(getField(r,'efficacite_auto-rapportee','efficacite_auto_rapportee'))===Math.max(...effVals)):-1;
    const worstIdx=effVals.length?rows.findIndex(r=>parseFloat(getField(r,'efficacite_auto-rapportee','efficacite_auto_rapportee'))===Math.min(...effVals)):-1;
    const reg=stdPrise==null?'--':stdPrise<=20?'Très régulier':stdPrise<=40?'Régulier':stdPrise<=60?'Irrégulier':'Très irrégulier';
    const regColor=stdPrise!=null&&stdPrise<=40?'#1D9E75':'#D85A30';

    document.getElementById('app').innerHTML=`
<div class="cover">
  <div class="mol">CH₃ · C₁₄H₁₉NO₂</div>
  <div class="ctitle">Suivi traitement TDAH</div>
  <div class="csub">${traitement} · ${type} · ${dose}</div>
  <div class="ckpis">
    <div class="ckpi"><div class="ckpi-v">${n}</div><div class="ckpi-l">Jours de suivi</div></div>
    <div class="ckpi"><div class="ckpi-v">${nPrise}</div><div class="ckpi-l">Jours avec prise</div></div>
  </div>
  <div class="cdate">${today}</div>
</div>
<button class="refresh-btn" onclick="location.reload()">↺ Actualiser les données</button>
<div class="filters">
  <div class="filters-label">Filtres</div>
  <select class="filter-pill" id="f_prise">
    <option value="all">Toutes les prises</option>
    <option value="Oui">Avec prise</option>
    <option value="Non">Sans prise</option>
  </select>
  <select class="filter-pill" id="f_dose">
    <option value="all">Toutes les doses</option>
    ${doses.map(d=>`<option value="${d}">${d}</option>`).join('')}
  </select>
  <select class="filter-pill" id="f_traitement">
    <option value="all">Tous les traitements</option>
    ${traitements.map(t=>`<option value="${t}">${t}</option>`).join('')}
  </select>
</div>
<div class="sec">
  <div class="slabel">Efficacité du traitement</div>
  <div class="kcard g">
    <div class="klabel">Efficacité moyenne</div>
    <div class="kval g">${avgEff!=null?avgEff+'%':'--'}</div>
    <div class="ksub">sur <span class="hi">${effVals.length}</span> jours renseignés</div>
  </div>
  <div class="g2">
    <div class="mini"><div class="mini-l">Meilleur jour</div><div class="mini-v" style="color:#1D9E75;font-size:13px;">${bestIdx>=0?rows[bestIdx].jour:'--'}</div><div style="font-size:11px;color:#555;margin-top:2px;">${bestIdx>=0?Math.round(Math.max(...effVals)*100)+'%':''}</div></div>
    <div class="mini"><div class="mini-l">Pire jour</div><div class="mini-v" style="color:#D85A30;font-size:13px;">${worstIdx>=0?rows[worstIdx].jour:'--'}</div><div style="font-size:11px;color:#555;margin-top:2px;">${worstIdx>=0?Math.round(Math.min(...effVals)*100)+'%':''}</div></div>
  </div>
  <div class="chart-card">
    <div class="ct">Évolution de l'efficacité</div>
    <div style="position:relative;width:100%;height:120px;"><canvas id="c_eff"></canvas></div>
  </div>
</div>
<div class="divider" style="margin:0 18px;"></div>
<div class="sec" style="margin-top:14px;">
  <div class="slabel">Heure de la prise</div>
  <div class="kcard b">
    <div class="klabel">Heure moyenne</div>
    <div class="kval b">${minToStr(avgPrise)}</div>
    <div class="ksub">min <span class="hi">${minToStr(minPrise)}</span> · max <span class="lo">${minToStr(maxPrise)}</span> · écart-type <span class="bl">${stdPrise!=null?stdPrise+' min':'--'}</span></div>
  </div>
  <div class="g2">
    <div class="mini"><div class="mini-l">Régularité</div><div class="mini-v" style="color:${regColor};font-size:13px;">${reg}</div></div>
    <div class="mini"><div class="mini-l">Coucher moyen</div><div class="mini-v" style="color:#378ADD;font-size:13px;">${minToStr(avgCoucher)}</div></div>
  </div>
  <div class="chart-card">
    <div class="legend"><span><span class="lsq" style="background:#378ADD;"></span>Heure prise</span><span><span class="lsq" style="background:#D85A30;"></span>Heure coucher</span><span><span class="lsq" style="background:#333;"></span>Non travaillé</span></div>
    <div class="ct">Suivi horaire prise & coucher</div>
    <div style="position:relative;width:100%;height:140px;"><canvas id="c_heure"></canvas></div>
  </div>
</div>
<div class="divider" style="margin:0 18px;"></div>
<div class="sec" style="margin-top:14px;">
  <div class="slabel">Fréquence cardiaque</div>
  <div class="kcard o">
    <div class="klabel">FC moyenne au repos</div>
    <div class="kval o">${avgFC!=null?avgFC:'--'} <span style="font-size:14px;color:#888;">bpm</span></div>
    <div class="ksub">min <span class="hi">${minFC!=null?minFC:'--'}</span> · max <span class="lo">${maxFC!=null?maxFC:'--'}</span></div>
  </div>
  <div class="g2">
    <div class="mini"><div class="mini-l">Plage min moy.</div><div class="mini-v" style="color:#378ADD;">${!isNaN(avgPlageMin)?avgPlageMin+' bpm':'--'}</div></div>
    <div class="mini"><div class="mini-l">Plage max moy.</div><div class="mini-v" style="color:#D85A30;">${!isNaN(avgPlageMax)?avgPlageMax+' bpm':'--'}</div></div>
  </div>
  <div class="chart-card">
    <div class="legend"><span><span class="lsq" style="background:#378ADD;"></span>FC repos</span><span><span class="lsq" style="border:1px dashed #1D9E75;background:transparent;"></span>Plage min</span><span><span class="lsq" style="border:1px dashed #D85A30;background:transparent;"></span>Plage max</span></div>
    <div style="position:relative;width:100%;height:130px;"><canvas id="c_fc"></canvas></div>
  </div>
</div>
<div class="divider" style="margin:0 18px;"></div>
<div class="sec" style="margin-top:14px;">
  <div class="slabel">Effets du traitement</div>
  <div class="occs">
    <div class="occ"><div class="occ-v" style="color:#1D9E75;">${effetsPos.length}</div><div class="occ-l">Occurrences positives</div></div>
    <div class="occ"><div class="occ-v" style="color:#D85A30;">${effetsNeg.length}</div><div class="occ-l">Occurrences négatives</div></div>
  </div>
  <div class="chart-card">
    <div class="ct" style="color:#1D9E75;">Impacts positifs</div>
    ${posCount.length?posCount.map(([nom,cnt])=>`<div class="bar-row"><div class="bar-name">${nom}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxPos*100)}%;background:#1D9E75;"></div></div><div class="bar-v" style="color:#1D9E75;">${cnt}</div></div>`).join(''):'<div class="no-data">Aucune donnée</div>'}
  </div>
  <div class="chart-card">
    <div class="ct" style="color:#D85A30;">Impacts négatifs</div>
    ${negCount.length?negCount.map(([nom,cnt])=>`<div class="bar-row"><div class="bar-name">${nom}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxNeg*100)}%;background:#D85A30;"></div></div><div class="bar-v" style="color:#D85A30;">${cnt}</div></div>`).join(''):'<div class="no-data">Aucune donnée</div>'}
  </div>
</div>`;

    document.getElementById('f_prise').value=filterState.prise;
    document.getElementById('f_dose').value=filterState.dose;
    document.getElementById('f_traitement').value=filterState.traitement;
    document.getElementById('f_prise').addEventListener('change',e=>{filterState.prise=e.target.value;render();});
    document.getElementById('f_dose').addEventListener('change',e=>{filterState.dose=e.target.value;render();});
    document.getElementById('f_traitement').addEventListener('change',e=>{filterState.traitement=e.target.value;render();});

    mkChart('c_eff',{type:'line',data:{labels:shortDates,datasets:[
      {data:effSerie,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#1D9E75',borderWidth:2,spanGaps:false},
      {data:Array(rows.length).fill(avgEff),borderColor:'#1D9E7533',borderWidth:1,borderDash:[4,3],pointRadius:0,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9},maxTicksLimit:6},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},callback:v=>v+'%'},grid:{color:gc},min:0,max:70}}}});

    mkChart('c_heure',{type:'line',data:{labels:shortDates,datasets:[
      {data:nonTravSerie,type:'bar',backgroundColor:'#33333388',borderWidth:0,yAxisID:'y2'},
      {data:priseSerie,borderColor:'#378ADD',tension:0.4,pointRadius:2,borderWidth:2,fill:false,spanGaps:false,yAxisID:'y'},
      {data:coucherSerie,borderColor:'#D85A30',tension:0.4,pointRadius:2,borderWidth:2,fill:false,spanGaps:false,yAxisID:'y2'}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      x:{ticks:{color:tc,font:{size:9},maxTicksLimit:6},grid:{color:gc}},
      y:{ticks:{color:tc,font:{size:9},callback:v=>{const h=Math.floor(v/60);const m=v%60;return h+'h'+(m<10?'0':'')+m;}},grid:{color:gc},min:500,max:780},
      y2:{position:'right',ticks:{color:tc,font:{size:9},callback:v=>{const h=Math.floor(v/60);const m=v%60;return h+'h'+(m<10?'0':'')+m;}},grid:{display:false},min:0,max:220}
    }}});

    mkChart('c_fc',{type:'line',data:{labels:shortDates,datasets:[
      {data:fcSerie,borderColor:'#378ADD',tension:0.4,pointRadius:2,borderWidth:2,fill:false},
      {data:pMinSerie,borderColor:'#1D9E75',tension:0.4,pointRadius:0,borderWidth:1.5,borderDash:[4,3],fill:false},
      {data:pMaxSerie,borderColor:'#D85A30',tension:0.4,pointRadius:0,borderWidth:1.5,borderDash:[4,3],fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9},maxTicksLimit:6},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},callback:v=>v+' bpm'},grid:{color:gc}}}}});
  }

  render();
}

if(savedKey){
  startWithKey();
}
</script>
</body>
</html>
