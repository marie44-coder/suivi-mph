<body>
<div id="root"></div>
<script>
const SHEET_ID='1BZWdgCe6JFlP8yVGkcjuqke0TDeqrbvhXUhaJy1NpxM';
const gc='rgba(255,255,255,0.04)';const tc='#555';
let charts=[];let rawData=[];let rawEffets=[];let currentTab='overview';
const MOIS=['jan.','fev.','mar.','avr.','mai','juin','juil.','aout','sep.','oct.','nov.','dec.'];
function formatDate(str){if(!str)return '--';const p=str.split('/');if(p.length<3)return str;return parseInt(p[0])+' '+MOIS[parseInt(p[1])-1]+' '+p[2];}
function toMin(str){if(!str)return null;const p=str.toString().trim().split(':');if(p.length<2)return null;const h=parseInt(p[0]);const m=parseInt(p[1]);if(isNaN(h)||isNaN(m))return null;return h*60+m;}
function minToStr(m){if(m==null||isNaN(m))return '--';const h=Math.floor(m/60);const mn=Math.round(m%60);return h.toString().padStart(2,'0')+':'+mn.toString().padStart(2,'0');}
function parseNum(v){if(v==null||v==='')return null;const n=parseFloat(v.toString().replace(',','.'));return isNaN(n)?null:n;}
function avg(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function stddev(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));if(v.length<2)return null;const m=avg(v);return Math.round(Math.sqrt(v.reduce((s,x)=>s+(x-m)**2,0)/v.length));}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;const c=new Chart(el,cfg);charts.push(c);return c;}
function getField(row,...keys){for(const k of keys){if(row[k]!==undefined&&row[k]!=='')return row[k];}return null;}
function parseDateStr(str){if(!str)return null;const p=str.split('/');if(p.length<3)return null;return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
function destroyCharts(){charts.forEach(c=>{try{c.destroy();}catch(e){}});charts=[];}
const fmtH=v=>{if(v==null||typeof v!=='number')return null;const h=Math.floor(v/60);const m=Math.round(v%60);return h.toString().padStart(2,'0')+'h'+m.toString().padStart(2,'0');};
const tooltipH={mode:'index',intersect:false,callbacks:{label:ctx=>{const v=ctx.raw;if(v==null||typeof v!=='number')return null;if(ctx.dataset.yAxisID==='y'||ctx.dataset.yAxisID==='y2')return ctx.dataset.label+': '+fmtH(v);return ctx.dataset.label+': '+v;}}};

async function fetchSheet(sheetName){
  const url='/.netlify/functions/sheets?sheet='+encodeURIComponent(sheetName);
  const r=await fetch(url);
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Erreur '+r.status);}
  const d=await r.json();
  if(!d.values||d.values.length<2)return[];
  const[headers,...rows]=d.values;
  return rows.map(row=>{const o={};headers.forEach((h,i)=>o[h.trim()]=row[i]||'');return o;});
}

async function startWithKey(){
  document.getElementById('root').innerHTML='<div class="loading"><div class="spinner"></div><div class="load-text">Connexion à Google Sheets…</div></div>';
  try{
    [rawData,rawEffets]=await Promise.all([fetchSheet('DATA'),fetchSheet('Effets')]);
    renderDashboard();
  }catch(e){
    document.getElementById('root').innerHTML='<div style="padding:40px 24px;"><div class="error-box">Impossible de charger les données.<br><br>'+e.message+'<br><br><button onclick="startWithKey()" style="margin-top:12px;background:#82B2C0;border:none;border-radius:8px;padding:10px 20px;color:#0d1629;cursor:pointer;font-size:13px;">Réessayer</button></div></div>';
  }
}

const filterState={prise:'all',dose:'all',traitement:'all',dateMin:null,dateMax:null};
let calMonthIdx=0;let calView='eff';let calMonthInitialized=false;
function initCalMonthIdx(){const allRows=rawData.filter(r=>r.jour&&r.jour.trim());const months=[...new Set(allRows.map(r=>{const d=parseDateStr(r.jour);if(!d)return null;return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');}).filter(Boolean))].sort();if(!months.length)return;const now=new Date();const curKey=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0');const idx=months.indexOf(curKey);calMonthIdx=idx>=0?idx:months.length-1;}
let granEff='jour';let granHeure='jour';let granFC='jour';

function getFiltered(){
  return rawData.filter(r=>{
    if(!r.jour||!r.jour.trim())return false;
    if(filterState.prise!=='all'&&r.prise!==filterState.prise)return false;
    if(filterState.dose!=='all'&&r.dose!==filterState.dose)return false;
    if(filterState.traitement!=='all'&&r.traitement!==filterState.traitement)return false;
    if(filterState.dateMin||filterState.dateMax){const d=parseDateStr(r.jour);if(!d)return false;if(filterState.dateMin&&d<filterState.dateMin)return false;if(filterState.dateMax&&d>filterState.dateMax)return false;}
    return true;
  });
}
function getFilteredEffets(rows){const dates=new Set(rows.map(r=>r.jour));return rawEffets.filter(e=>dates.has(e.date));}
function resetFilters(){filterState.prise='all';filterState.dose='all';filterState.traitement='all';filterState.dateMin=null;filterState.dateMax=null;renderDashboard();}

function weekKey(d){const day=d.getDay()===0?6:d.getDay()-1;const mon=new Date(d.getFullYear(),d.getMonth(),d.getDate()-day);return mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0');}
function groupByWeek(rows,valFn){
  const weeks={};rows.forEach(r=>{const d=parseDateStr(r.jour);if(!d)return;const k=weekKey(d);if(!weeks[k])weeks[k]=[];const v=valFn(r);if(v!=null)weeks[k].push(v);});
  return Object.entries(weeks).sort(([a],[b])=>a.localeCompare(b)).map(([k,vals])=>({label:k.slice(8,10)+'/'+k.slice(5,7),val:vals.length?avg(vals):null}));
}
function groupByMonth(rows,valFn){
  const months={};rows.forEach(r=>{const d=parseDateStr(r.jour);if(!d)return;const k=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');if(!months[k])months[k]=[];const v=valFn(r);if(v!=null)months[k].push(v);});
  return Object.entries(months).sort(([a],[b])=>a.localeCompare(b)).map(([k,vals])=>({label:MOIS[parseInt(k.slice(5))-1]+' '+k.slice(2,4),val:vals.length?avg(vals):null}));
}

function effBg(v){if(v==null)return'#1a1e2e';if(v>=60)return'#1a3a45';if(v>=50)return'#3d6878';if(v>=40)return'#82B2C0';if(v>=30)return'#C3DEDD';if(v>=20)return'#deeef0';return'#E8F4F5';}
function effTx(v){if(v==null)return'#2a2d35';if(v>=50)return'#C3DEDD';if(v>=30)return'#1a3a45';return'#3d6878';}
function coucherBg(m){if(m==null)return'#1a1e2e';if(m>=150)return'#1a3a45';if(m>=120)return'#3d6878';if(m>=90)return'#82B2C0';if(m>=60)return'#C3DEDD';if(m>=30)return'#deeef0';return'#E8F4F5';}
function coucherTx(m){if(m==null)return'#2a2d35';if(m>=90)return'#C3DEDD';if(m>=30)return'#1a3a45';return'#1a3a45';}
function priseBg(m){if(m==null)return'#1a1e2e';if(m>=11*60+30)return'#1a3a45';if(m>=11*60)return'#3d6878';if(m>=10*60+30)return'#82B2C0';if(m>=10*60)return'#C3DEDD';if(m>=9*60+30)return'#deeef0';return'#E8F4F5';}
function priseTx(m){if(m==null)return'#2a2d35';if(m>=11*60)return'#C3DEDD';if(m>=10*60+30)return'#1a3a45';return'#3d6878';}
function effetsBg(effets){if(!effets||effets.length===0)return'#1e2235';var neg=['Agitation','Migraine','Appetit','Appétit','Difficulté','Palpitations','Tournis','Bouche','Lèvres','Perte rep'];var pos=['Concentration','Energie','Motivation','Attention','Clarte','Bonne humeur','Moins fatigué'];var hasNeg=effets.some(function(e){return neg.some(function(n){return e.includes(n);})||e.includes('↓');});var hasPos=effets.some(function(e){return pos.some(function(p){return e.includes(p);});});if(hasNeg&&hasPos)return'#251a08';if(hasNeg)return'#2a1010';if(hasPos)return'#0f2535';return'#1e2235';}
function effetsTx(effets){if(!effets||effets.length===0)return'rgba(195,222,221,0.35)';var neg=['Agitation','Migraine','Appetit','Appétit','Difficulté','Palpitations','Tournis','Bouche','Lèvres','Perte rep'];var pos=['Concentration','Energie','Motivation','Attention','Clarte','Bonne humeur','Moins fatigué'];var hasNeg=effets.some(function(e){return neg.some(function(n){return e.includes(n);})||e.includes('↓');});var hasPos=effets.some(function(e){return pos.some(function(p){return e.includes(p);});});if(hasNeg&&hasPos)return'#E8D0A0';if(hasNeg)return'#E08070';if(hasPos)return'#82B2C0';return'rgba(195,222,221,0.35)';}

const DOSE_COLORS={'18mg':{bg:'#82B2C0',dark:'#0a2535',light:'#C3DEDD'},'36mg':{bg:'#8FBF7A',dark:'#142010',light:'#C3E8B0'},'54mg':{bg:'#D4A060',dark:'#2a1808',light:'#F0D0A0'}};

function showEffetPopup(dateStr,effetsList){
  var ex=document.getElementById('cc-popup-overlay');if(ex)ex.remove();
  var ov=document.createElement('div');ov.className='cc-popup-overlay';ov.id='cc-popup-overlay';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  var box=document.createElement('div');box.className='cc-popup';

function pearson(a,b){const pairs=a.map((v,i)=>[v,b[i]]).filter(([x,y])=>x!=null&&y!=null);if(pairs.length<3)return null;const mx=avg(pairs.map(p=>p[0]));const my=avg(pairs.map(p=>p[1]));const num=pairs.reduce((s,[x,y])=>s+(x-mx)*(y-my),0);const da=Math.sqrt(pairs.reduce((s,[x])=>s+(x-mx)**2,0));const db=Math.sqrt(pairs.reduce((s,[,y])=>s+(y-my)**2,0));return(da===0||db===0)?null:num/(da*db);}

      const fcMinC=activeDoses.map(function(dm){return doseStats[dm]?doseStats[dm].avgFCMin:null;});
      const fcMaxC=activeDoses.map(function(dm){return doseStats[dm]?doseStats[dm].avgFCMax:null;});
      const fcMoyC=activeDoses.map(function(dm){return doseStats[dm]?doseStats[dm].avgFC:null;});
      const fcBgC=activeDoses.map(function(dm){return DOSE_COLORS[dm]?DOSE_COLORS[dm].bg:'#82B2C0';});
      const fcEl=document.getElementById('c_comp_fc');
      if(fcEl){
        const fcChart=new Chart(fcEl,{type:'bar',data:{labels:fcLabelsC,datasets:[
          {data:activeDoses.map(function(_,i){return[fcMinC[i],fcMaxC[i]];}),backgroundColor:fcBgC.map(function(c){return c+'44';}),borderColor:fcBgC,borderWidth:1.5,borderRadius:4,borderSkipped:false}
        ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){const i=ctx.dataIndex;return['Min moy. : '+(fcMinC[i]||'--')+' bpm','FC moy. : '+(fcMoyC[i]||'--')+' bpm'];}}}},scales:{x:{ticks:{color:tc,font:{size:10},callback:function(v){return v+' bpm';}},grid:{color:gc},min:20,max:220},y:{ticks:{color:tc,font:{size:12}},grid:{color:gc}}}}});
        charts.push(fcChart);
        /* trait FC moy en afterDraw */
        Chart.register({id:'fcMoyLine',afterDraw:function(chart){
          if(chart.canvas.id!=='c_comp_fc')return;
          const ctx2=chart.ctx,sx=chart.scales.x,sy=chart.scales.y;
          ctx2.save();
          activeDoses.forEach(function(_,i){
            if(fcMoyC[i]==null)return;
            const xp=sx.getPixelForValue(fcMoyC[i]);
            const meta=chart.getDatasetMeta(0).data[i];if(!meta)return;
            const yc=meta.y,hh=meta.height/2;
            ctx2.strokeStyle='#ffffff';ctx2.lineWidth=2.5;
            ctx2.beginPath();ctx2.moveTo(xp,yc-hh+2);ctx2.lineTo(xp,yc+hh-2);ctx2.stroke();
          });
          ctx2.restore();
        }});
      }

      const allPriseRowsC=allRowsAll.filter(function(r){return r.prise==='Oui';});
      function buildFC2Chart(gran){
        var existingFC2=charts.find(function(c){return c.canvas&&c.canvas.id==='c_comp_fc2';});
        if(existingFC2){try{existingFC2.destroy();}catch(e){}charts=charts.filter(function(c){return c!==existingFC2;});}
        var labels,vals,ptColors;
        if(gran==='semaine'){
          var wfc=groupByWeek(allPriseRowsC,function(r){return parseNum(r.fq_repos_moy);});
          labels=wfc.map(function(w){return w.label;});
          vals=wfc.map(function(w){return w.val;});
          ptColors=wfc.map(function(w){
            var wkRows=allPriseRowsC.filter(function(r){var d=parseDateStr(r.jour);return d&&(weekKey(d).slice(8,10)+'/'+weekKey(d).slice(5,7))===w.label;});
            var counts={};wkRows.forEach(function(r){counts[r.dose]=(counts[r.dose]||0)+1;});
            var dom=null,mx=0;Object.keys(counts).forEach(function(k){if(counts[k]>mx){mx=counts[k];dom=k;}});
            return dom&&DOSE_COLORS[dom]?DOSE_COLORS[dom].bg:'#82B2C0';
          });
        } else if(gran==='mois'){
          var mfc=groupByMonth(allPriseRowsC,function(r){return parseNum(r.fq_repos_moy);});
          labels=mfc.map(function(m){return m.label;});
          vals=mfc.map(function(m){return m.val;});
          ptColors=labels.map(function(){return'#82B2C0';});
        } else {
          labels=allPriseRowsC.map(function(r){var p=r.jour.split('/');return p.length>=2?p[0]+'/'+p[1]:r.jour;});
          vals=allPriseRowsC.map(function(r){return parseNum(r.fq_repos_moy);});
          ptColors=allPriseRowsC.map(function(r){return DOSE_COLORS[r.dose]?DOSE_COLORS[r.dose].bg:'#82B2C0';});
        }
        var segFn=gran==='jour'?{borderColor:function(ctx){var i=ctx.p0DataIndex;return DOSE_COLORS[allPriseRowsC[i]&&allPriseRowsC[i].dose]?DOSE_COLORS[allPriseRowsC[i].dose].bg:'#82B2C0';}}:{};
        mkChart('c_comp_fc2',{type:'line',data:{labels:labels,datasets:[{data:vals,borderColor:'#F6C7B3',backgroundColor:'transparent',tension:0.4,pointRadius:3,pointBackgroundColor:ptColors,borderWidth:1.5,spanGaps:true,segment:segFn}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.raw!=null?Math.round(ctx.raw)+' bpm':null;}}}},scales:{x:{ticks:{color:tc,font:{size:9},maxTicksLimit:8,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:function(v){return v+' bpm';},maxTicksLimit:5},grid:{color:gc}}}}});
      }
      window.setGranFC2=function(gran,btn){
  var wrap=document.getElementById('fc2-gran-wrap');
  if(wrap)wrap.querySelectorAll('.gran-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  buildFC2Chart(gran);
};
      buildFC2Chart('jour');

      const radarLabels=['Efficacit\u00e9','FC normale','R\u00e9gularit\u00e9 prise','Effets positifs','Sans effets n\u00e9gatifs'];
      const maxFCAll=Math.max.apply(null,activeDoses.map(function(dm){return doseStats[dm]?doseStats[dm].avgFC||0:0;}));
      const radarDatasets=activeDoses.map(function(dm){
        const s=doseStats[dm];if(!s)return null;
        const dc=DOSE_COLORS[dm]||{bg:'#82B2C0'};
        const effScore=s.avgEff||0;
        const fcScore=s.avgFC&&maxFCAll?Math.max(0,100-((s.avgFC-50)/maxFCAll)*100):50;
        const priseStd=stddev(s.rows.map(function(r){return toMin(r.heure_prise);}).filter(function(v){return v!=null;}));
        const regScore=priseStd!=null?Math.max(0,100-priseStd):50;
        const posScore=s.n>0?Math.min(100,Math.round(s.pos/s.n*20)):0;
        const negScore=s.n>0?Math.max(0,100-Math.round(s.neg/s.n*20)):100;
        return{label:dm,data:[effScore,fcScore,regScore,posScore,negScore],borderColor:dc.bg,backgroundColor:dc.bg+'22',pointBackgroundColor:dc.bg,pointRadius:4,borderWidth:2};
      }).filter(Boolean);
      mkChart('c_comp_radar',{type:'radar',data:{labels:radarLabels,datasets:radarDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{ticks:{display:false},grid:{color:gc},angleLines:{color:gc},pointLabels:{color:tc,font:{size:11}},min:0,max:100}}}});
    },100);
  }


  document.getElementById('root').innerHTML='<div class="app"><div class="cover"><div class="cover-top"><div><div class="mol">CH&#8323; \u00b7 C&#8321;&#8324;H&#8321;&#8329;NO&#8322;</div><div class="ctitle">Suivi traitement TDAH</div><div class="csub">'+traitement+' \u00b7 '+type+' \u00b7 '+dose+'</div></div><button class="refresh-btn" onclick="location.reload()">&#8634; Actualiser</button></div><div class="cover-kpis"><div class="ckpi"><div class="ckpi-v">'+allRows.length+'</div><div class="ckpi-l">Jours de suivi</div></div><div class="ckpi"><div class="ckpi-v">'+allRows.filter(r=>r.prise==='Oui').length+'</div><div class="ckpi-l">Jours avec prise</div></div><div class="ckpi"><div class="ckpi-v">'+(avgEff!=null?avgEff+'%':'--')+'</div><div class="ckpi-l">Efficacité moyenne</div></div><div class="ckpi"><div class="ckpi-v">'+dose+'</div><div class="ckpi-l">Dose actuelle</div></div></div><div class="cdate">'+today+'</div></div><div class="tabs-wrap"><div class="tabs"><button class="tab '+(currentTab==='overview'?'active':'')+'" onclick="switchTab(\'overview\')">Chiffres clés</button><button class="tab '+(currentTab==='analyses'?'active':'')+'" onclick="switchTab(\'analyses\')">Analyses</button>'
+'<button class="tab '+(currentTab==='comparatif'?'active':'')+'" onclick="switchTab(\'comparatif\')">Comparatif doses</button></div></div><div id="page-content">'+pageContent+'</div></div>';

  const fDateMin=document.getElementById('f_dateMin');
  const fDateMax=document.getElementById('f_dateMax');
  const fPrise=document.getElementById('f_prise');
  const fDose=document.getElementById('f_dose');
  const fTrait=document.getElementById('f_traitement');
  if(fPrise){fPrise.value=filterState.prise;fPrise.addEventListener('change',e=>{filterState.prise=e.target.value;renderDashboard();});}
  if(fDose){fDose.value=filterState.dose;fDose.addEventListener('change',e=>{filterState.dose=e.target.value;renderDashboard();});}
  if(fTrait){fTrait.value=filterState.traitement;fTrait.addEventListener('change',e=>{filterState.traitement=e.target.value;renderDashboard();});}
  if(fDateMin){fDateMin.addEventListener('change',e=>{filterState.dateMin=e.target.value?new Date(e.target.value):null;renderDashboard();});}
  if(fDateMax){fDateMax.addEventListener('change',e=>{filterState.dateMax=e.target.value?new Date(e.target.value):null;renderDashboard();});}

  if(currentTab==='overview'){
    buildCalendar('cal-container',rows,effets);
    if(catLabels.length){mkChart('c_cat_eff',{type:'doughnut',data:{labels:catLabels,datasets:[{data:catVals,backgroundColor:catLabels.map(function(l){return l==='Positifs'?'#82B2C0':'#E08070';}),borderColor:'#161920',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'right',labels:{color:'#888',font:{size:12},boxWidth:10}},tooltip:{callbacks:{label:function(ctx){return ctx.label+' : '+ctx.raw+' occurrences';}}}}}});}
    const effS=getEffSeries(granEff);
    const avgAnnotation={avg:{type:'line',xMin:-0.5,xMax:effS.labels.length-0.5,yMin:avgEff,yMax:avgEff,borderColor:'transparent',label:{display:true,content:'moy. '+(avgEff!=null?avgEff:'--')+'%',position:'end',color:'#82B2C0',font:{size:11},backgroundColor:'transparent',padding:0}}};
    var effAnn=Object.assign({},avgAnnotation);
    /* fond coloré par dose sur toutes les granularités */
    var _effLabels=effS.labels;
    var _annotDoseGran={};
    if(granEff==='jour'){
      Object.assign(_annotDoseGran,annotationsDose);
    } else {
      /* pour semaine/mois : calculer la dose dominante de chaque période */
      _effLabels.forEach(function(lbl,i){
        var periodRows=rows.filter(function(r){
          if(granEff==='semaine'){var d=parseDateStr(r.jour);return d&&(d.getDate().toString().padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'))===lbl;}
          if(granEff==='mois'){var d=parseDateStr(r.jour);return d&&(MOIS[d.getMonth()]+' '+String(d.getFullYear()).slice(2))===lbl;}
          return false;
        });
        var counts={};periodRows.forEach(function(r){if(r.dose)counts[r.dose]=(counts[r.dose]||0)+1;});
        var dom=null,mx=0;Object.keys(counts).forEach(function(k){if(counts[k]>mx){mx=counts[k];dom=k;}});
        if(dom&&DOSE_COLORS[dom]){
          _annotDoseGran['dp'+i]={type:'box',xMin:i-0.5,xMax:i+0.5,backgroundColor:DOSE_COLORS[dom].bg+'22',borderColor:'transparent',borderWidth:0};
        }
      });
    }
    Object.assign(effAnn,_annotDoseGran);
    var effDatasets=[];
    if(effS.byDose){
      ['18mg','36mg','54mg'].forEach(function(dm){
        var dc=DOSE_COLORS[dm]||{bg:'#82B2C0'};
        var d=effS.byDose[dm]||[];
        if(d.some(function(v){return v!=null;})){
          effDatasets.push({label:dm,data:d,borderColor:dc.bg,backgroundColor:dc.bg+'28',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:dc.bg,borderWidth:2,spanGaps:false});
        }
      });
    } else {
      effDatasets.push({data:effS.data,borderColor:'#82B2C0',backgroundColor:'rgba(130,178,192,0.15)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#82B2C0',borderWidth:2,spanGaps:false});
    }
    effDatasets.push({data:Array(effS.labels.length).fill(avgEff),borderColor:'#82B2C044',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false});
    mkChart('c_eff',{type:'line',data:{labels:effS.labels,datasets:effDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:function(ctx){return ctx.raw!=null?(ctx.datasetIndex===0?'Efficacité':'Moy.')+' : '+Math.round(ctx.raw)+'%':null;}}},annotation:{annotations:effAnn}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:8,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:function(v){return v+'%';},maxTicksLimit:5},grid:{color:gc},min:0,max:100}}}});
    const heureS=getHeureSeries(granHeure);
    const annots=granHeure==='jour'?annotations:{};
    mkChart('c_heure',{type:'line',data:{labels:heureS.labels,datasets:[{label:'Heure prise',data:heureS.prise,borderColor:'#C3DEDD',tension:0.4,pointRadius:3,borderWidth:2,fill:false,spanGaps:false,yAxisID:'y'},{label:'Heure coucher',data:heureS.coucher,borderColor:'#F6C7B3',tension:0.4,pointRadius:3,borderWidth:2,fill:false,spanGaps:false,borderDash:[4,3],yAxisID:'y2'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:tooltipH,annotation:{annotations:annots}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:8,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},padding:8,callback:fmtH,maxTicksLimit:5},grid:{color:gc},min:500,max:780},y2:{position:'right',ticks:{color:tc,font:{size:10},padding:8,callback:fmtH,maxTicksLimit:5},grid:{display:false},min:0,max:220}}}});
    const fcS=getFCSeries(granFC);
    var fcAnn=granFC==='jour'?annotationsPrise:{};
    mkChart('c_fc',{type:'line',data:{labels:fcS.labels,datasets:[{label:'FC repos',data:fcS.fc,borderColor:'#82B2C0',tension:0.4,pointRadius:3,borderWidth:2,fill:false,spanGaps:false},{label:'Plage min',data:fcS.min,borderColor:'#DCECE9',tension:0.4,pointRadius:0,borderWidth:1.5,borderDash:[4,3],fill:false,spanGaps:false},{label:'Plage max',data:fcS.max,borderColor:'#F6C7B3',tension:0.4,pointRadius:0,borderWidth:1.5,borderDash:[4,3],fill:false,spanGaps:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:function(ctx){return ctx.raw!=null?ctx.dataset.label+': '+Math.round(ctx.raw)+' bpm':null;}}},annotation:{annotations:fcAnn}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:8,maxRotation:0},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},padding:8,callback:function(v){return v+' bpm';},maxTicksLimit:5},grid:{color:gc}}}}});
  }
}

function switchTab(tab){currentTab=tab;renderDashboard();}
startWithKey();
</script>
